<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sincronário das 13 Luas - Completo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ===== DESIGN SYSTEM — SINCRONÁRIO ===== */
:root {
  --bg:      #131110;
  --bg2:     #1c1714;
  --card:    #231c18;
  --card2:   #2c2420;
  --border:  rgba(165,124,0,0.18);
  --border2: rgba(165,124,0,0.38);
  --gold:    #A57C00;
  --gold2:   #c9a030;
  --gold3:   #e8c060;
  --green:   #009739;
  --brown:   #3C2F2F;
  --text:    #ede0c8;
  --text2:   #b0a080;
  --text3:   #6e5e42;
  --red:     #b03020;
  --white:   #ddd4c0;
  --blue:    #1a6080;
  --radius:  8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;font-size:16px;line-height:1.65;min-height:100vh}

/* ── LOGIN ── */
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;background:var(--bg)}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:3rem 2.5rem;max-width:380px;width:100%;text-align:center}
.login-logo{font-size:2.5rem;margin-bottom:1rem;display:block}
.login-box h1{font-family:'Cinzel',serif;font-size:1.5rem;color:var(--gold2);margin-bottom:0.4rem;letter-spacing:0.05em}
.login-divider{width:32px;height:1px;background:var(--green);margin:1.2rem auto;opacity:0.7}
.login-box p{color:var(--text3);margin-bottom:1.8rem;font-size:0.88rem;letter-spacing:0.03em}
.btn-google{background:var(--card2);color:var(--text2);border:1px solid var(--border);border-radius:7px;padding:11px 22px;font-family:'Cinzel',serif;font-size:0.8rem;cursor:pointer;display:inline-flex;align-items:center;gap:10px;transition:border-color 0.2s,color 0.2s;letter-spacing:0.04em}
.btn-google:hover{border-color:var(--gold);color:var(--text)}
.error-msg{background:rgba(176,48,32,0.1);border:1px solid rgba(176,48,32,0.35);color:#d07060;padding:0.75rem 1rem;border-radius:7px;margin-top:1rem;font-size:0.85rem}
.loading{color:var(--text3);margin-top:1rem;font-style:italic;font-size:0.88rem}

/* ── LAYOUT ── */
.container{max-width:1100px;margin:0 auto;padding:1.2rem 1.2rem;display:none}
.container.active{display:block}
h1{font-family:'Cinzel',serif;font-size:1.6rem;color:var(--gold2);text-align:center;margin-bottom:0.2rem;letter-spacing:0.05em}

/* ── USER BAR ── */
.user-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:0.75rem 1.2rem;margin-bottom:1.2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.user-avatar{width:34px;height:34px;border-radius:50%;border:1px solid var(--gold)}

/* ── BOTÕES ── */
.btn-logout,.btn-admin,.btn-export{background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--text3);padding:6px 13px;font-family:'Cinzel',serif;font-size:0.65rem;cursor:pointer;text-transform:uppercase;letter-spacing:0.06em;transition:all 0.2s}
.btn-logout:hover,.btn-export:hover{border-color:var(--text2);color:var(--text2)}
.btn-admin{border-color:rgba(165,124,0,0.4);color:var(--gold)}
.btn-admin:hover{background:var(--gold);color:var(--bg)}

/* ── TABS ── */
.tabs{display:flex;gap:0;margin-bottom:1.2rem;border-bottom:1px solid var(--border)}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:'Cinzel',serif;font-size:0.68rem;padding:9px 18px;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;transition:color 0.2s,border-color 0.2s;margin-bottom:-1px}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold)}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── SECTIONS ── */
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem;margin-bottom:0.8rem}
.section-title{font-family:'Cinzel',serif;font-size:0.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1.2rem;display:flex;align-items:center;gap:0.6rem}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── KIN HERO ── */
.kin-hero{text-align:center;padding:2rem 1.5rem 1.8rem;background:var(--card);border-radius:var(--radius);margin-bottom:0.8rem;border:1px solid var(--border);position:relative;overflow:hidden}
.kin-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),var(--gold2),var(--green),transparent);opacity:0.7}
.kin-num{font-family:'Cinzel',serif;font-size:0.65rem;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.6rem}
.kin-title{font-family:'Cinzel',serif;font-size:1.75rem;margin:0.4rem 0 0.6rem;letter-spacing:0.03em;color:var(--gold2);line-height:1.25}
.kin-subtitle{color:var(--text3);font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em}
.kin-frase{color:var(--text2);font-size:0.95rem;font-style:italic;margin:1.3rem auto 0;padding:1rem 1.3rem;background:rgba(0,151,57,0.05);border-left:1px solid var(--green);max-width:700px;line-height:1.9}

/* ── CARDS ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin:1rem 0}
.card{background:var(--bg2);border-radius:7px;padding:1rem 1.1rem;border:1px solid var(--border);transition:border-color 0.2s}
.card:hover{border-color:var(--border2)}
.card-label{font-size:0.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px}
.card-val{font-family:'Cinzel',serif;font-size:0.9rem;color:var(--text)}

/* ── SELOS ── */
.selo-icon{width:68px;height:68px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid;margin:0 auto 0.6rem;overflow:hidden}
.selo-red{background:rgba(176,48,32,0.15);border-color:rgba(176,48,32,0.4)}
.selo-white{background:rgba(220,212,192,0.08);border-color:rgba(220,212,192,0.25)}
.selo-blue{background:rgba(26,96,128,0.15);border-color:rgba(26,96,128,0.4)}
.selo-yellow{background:rgba(165,124,0,0.15);border-color:rgba(165,124,0,0.4)}

/* ── ORÁCULO — GRID FIXO, SEM POSITION ABSOLUTE ── */
.oraculo-grid{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  grid-template-rows:auto auto auto;
  gap:8px;
  align-items:center;
  justify-items:center;
  margin:1rem 0;
  max-width:380px;
  margin-left:auto;
  margin-right:auto;
}
.oraculo-cell-top   {grid-column:2;grid-row:1}
.oraculo-cell-left  {grid-column:1;grid-row:2}
.oraculo-cell-center{grid-column:2;grid-row:2}
.oraculo-cell-right {grid-column:3;grid-row:2}
.oraculo-cell-bottom{grid-column:2;grid-row:3}
.oraculo-item{text-align:center}
.oraculo-central .selo-icon{width:80px;height:80px;border-radius:10px;border-width:1px}
.oraculo-side .selo-icon  {width:62px;height:62px;border-radius:7px}
.oraculo-nome{font-size:0.62rem;margin-top:0.35rem;color:var(--text3);font-family:'Cinzel',serif;letter-spacing:0.04em;line-height:1.3}

/* ── ONDA ENCANTADA — GRID PRECISO, ESCALÁVEL ── */
.onda-wrap{display:flex;justify-content:center;margin:1rem 0}
.onda-L{
  display:grid;
  grid-template-columns:repeat(4,var(--cell));
  grid-template-rows:repeat(4,var(--cell));
  --cell:62px;
  gap:5px;
}
.onda-L .onda-kin:nth-child(1) {grid-column:1;grid-row:1}
.onda-L .onda-kin:nth-child(2) {grid-column:2;grid-row:1}
.onda-L .onda-kin:nth-child(3) {grid-column:3;grid-row:1}
.onda-L .onda-kin:nth-child(4) {grid-column:4;grid-row:1}
.onda-L .onda-kin:nth-child(5) {grid-column:1;grid-row:2}
.onda-L .onda-kin:nth-child(6) {grid-column:1;grid-row:3}
.onda-L .onda-kin:nth-child(7) {grid-column:1;grid-row:4}
.onda-L .onda-kin:nth-child(8) {grid-column:2;grid-row:4}
.onda-L .onda-kin:nth-child(9) {grid-column:3;grid-row:4}
.onda-L .onda-kin:nth-child(10){grid-column:4;grid-row:2}
.onda-L .onda-kin:nth-child(11){grid-column:4;grid-row:3}
.onda-L .onda-kin:nth-child(12){grid-column:4;grid-row:4}
.onda-L .onda-kin:nth-child(13){grid-column:2/4;grid-row:2/4;width:auto;height:auto}
.onda-kin{
  width:var(--cell);height:var(--cell);
  border-radius:7px;display:flex;align-items:center;justify-content:center;
  border:1px solid;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;
  overflow:hidden;
}
.onda-kin:hover{transform:scale(1.07)}
.onda-kin.active{box-shadow:0 0 0 2px var(--gold);border-color:var(--gold)!important}
.onda-kin:nth-child(13){font-size:2rem}
.cor-red   {background:rgba(176,48,32,0.15);border-color:rgba(176,48,32,0.4)}
.cor-white {background:rgba(220,212,192,0.06);border-color:rgba(220,212,192,0.22)}
.cor-blue  {background:rgba(26,96,128,0.15);border-color:rgba(26,96,128,0.4)}
.cor-yellow{background:rgba(165,124,0,0.15);border-color:rgba(165,124,0,0.4)}

/* ── PRÁTICAS ── */
.praticas-list{list-style:none;padding:0}
.praticas-list li{padding:0.7rem 1rem;margin-bottom:5px;background:var(--bg2);border-radius:6px;border-left:1px solid var(--green);display:flex;align-items:flex-start;gap:10px;font-size:0.9rem;line-height:1.5;transition:border-color 0.2s}
.praticas-list li:hover{border-left-color:var(--gold)}
.praticas-list li::before{content:'—';color:var(--green);font-size:0.75rem;flex-shrink:0;margin-top:0.2rem}

/* ── MISC ── */
.hidden{display:none}
input[type="date"]{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-family:inherit;color-scheme:dark;font-size:0.9rem;transition:border-color 0.2s}
input[type="date"]:focus{outline:none;border-color:var(--gold)}
.btn-calc{background:transparent;border:1px solid rgba(0,151,57,0.5);border-radius:6px;color:var(--green);font-family:'Cinzel',serif;font-size:0.68rem;padding:8px 18px;cursor:pointer;text-transform:uppercase;letter-spacing:0.06em;transition:all 0.2s}
.btn-calc:hover{background:var(--green);color:#fff;border-color:var(--green)}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:0.8rem}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:0.7rem}
.tooltip{position:relative;cursor:help}
.tooltip:hover::after{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text2);padding:0.35rem 0.8rem;border-radius:5px;border:1px solid var(--border);white-space:nowrap;z-index:1000;font-size:0.68rem}
.info-text{color:var(--text2);font-size:0.85rem;line-height:1.65;margin:0.35rem 0}
.info-box{background:var(--bg2);padding:0.9rem 1rem;border-radius:7px;border-left:1px solid var(--green);margin:0.7rem 0}

/* ── LUA GALÁCTICA ── */
.lua-grid{display:flex;gap:4px}
.lua-col{display:flex;flex-direction:column;gap:4px}
.lua-dia{width:28px;height:28px;background:var(--bg2);border:1px solid;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:0.58rem;font-weight:600;transition:all 0.15s;font-family:'Cinzel',serif}
.lua-dia.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.lua-red   {border-color:rgba(176,48,32,0.45);color:rgba(176,48,32,0.7)}
.lua-white {border-color:rgba(220,212,192,0.25);color:rgba(220,212,192,0.6)}
.lua-blue  {border-color:rgba(26,96,128,0.45);color:rgba(26,96,128,0.8)}
.lua-yellow{border-color:rgba(165,124,0,0.45);color:rgba(165,124,0,0.8)}
.lua-red.active,.lua-white.active,.lua-blue.active,.lua-yellow.active{color:var(--bg)}

/* ===== MEDIA QUERIES ===== */
@media (max-width: 600px) {
  body { font-size: 15px; }
  .container { padding: 0.9rem 0.75rem; }
  h1 { font-size: 1.35rem; }

  .user-bar { padding: 0.65rem 0.75rem; flex-direction: column; align-items: flex-start; }
  .user-bar > div:last-child { width: 100%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
  .btn-logout, .btn-admin, .btn-export { width: 100%; text-align: center; font-size: 0.6rem; padding: 5px 8px; }

  .section { padding: 1rem; }
  .kin-hero { padding: 1.4rem 1rem 1.2rem; }
  .kin-title { font-size: 1.35rem; }
  .kin-frase { font-size: 0.88rem; padding: 0.85rem 1rem; }

  /* ORÁCULO: reduz tamanho dos selos mas mantém grid */
  .oraculo-grid { gap: 6px; max-width: 320px; }
  .oraculo-central .selo-icon { width: 66px; height: 66px; }
  .oraculo-side .selo-icon    { width: 52px; height: 52px; }
  .oraculo-nome { font-size: 0.58rem; }

  /* ONDA: reduz a variável --cell, mantém EXATO formato L */
  .onda-L { --cell: 52px; gap: 4px; }

  .cards { grid-template-columns: 1fr 1fr; gap: 6px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; gap: 0.7rem; }
  input[type="date"] { width: 100%; }
  .btn-calc { width: 100%; margin-top: 6px; }
  .tab { padding: 8px 12px; font-size: 0.62rem; }

  .lua-dia { width: 25px; height: 25px; font-size: 0.52rem; }
  .lua-grid { gap: 3px; }
  .lua-col  { gap: 3px; }
}

@media (max-width: 400px) {
  .container { padding: 0.75rem 0.6rem; }
  h1 { font-size: 1.15rem; }
  .kin-title { font-size: 1.15rem; }
  .oraculo-grid { max-width: 280px; gap: 5px; }
  .oraculo-central .selo-icon { width: 56px; height: 56px; }
  .oraculo-side .selo-icon    { width: 44px; height: 44px; }

  /* ONDA ainda menor, mas mantém L */
  .onda-L { --cell: 44px; gap: 4px; }
  .onda-kin:nth-child(13) { font-size: 1.5rem; }

  .lua-dia { width: 22px; height: 22px; font-size: 0.48rem; }
  .cards { grid-template-columns: 1fr; }
}

@media (max-height: 500px) and (orientation: landscape) {
  .kin-hero { padding: 0.8rem 1rem; }
  .kin-title { font-size: 1.2rem; }
  .kin-frase { font-size: 0.82rem; padding: 0.7rem; }
}
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}
</style>

<script>
// DADOS E CONFIGURAÇÕES
let DATA = {};
const DATA_PRONTO = fetch('./sincronario_dados.json')
  .then(r => r.json())
  .then(d => {
    DATA = d;
    console.log('✓ Dados carregados:', Object.keys(DATA.kins).length, 'kins');
  })
  .catch(e => console.warn('⚠️ Erro ao carregar JSON:', e));

const EMOJIS = ['🐉', '💨', '🌌', '🌱', '🐍', '☯️', '✋', '⭐', '🌙', '🐕', '🐒', '👤', '🚶', '🧙', '🦅', '⚔️', '🌍', '🪞', '⛈️', '☀️'];
const CORES_SELO = ['red', 'white', 'blue', 'yellow', 'red', 'white', 'blue', 'yellow', 'red', 'white', 'blue', 'yellow', 'red', 'white', 'blue', 'yellow', 'red', 'white', 'blue', 'yellow'];
const CORES_ONDA = ['red', 'red', 'red', 'red', 'white', 'white', 'white', 'white', 'blue', 'blue', 'blue', 'blue', 'yellow'];
const FEMININOS = new Set(['Noite', 'Serpente', 'Mão', 'Estrela', 'Lua', 'Águia', 'Terra', 'Semente', 'Tormenta']);

function getSeloEmoji(nome) {
  const nomes = ['Dragão', 'Vento', 'Noite', 'Semente', 'Serpente', 'Enlaçador', 'Mão', 'Estrela', 'Lua', 'Cão', 'Macaco', 'Humano', 'Caminhante', 'Mago', 'Águia', 'Guerreiro', 'Terra', 'Espelho', 'Tormenta', 'Sol'];
  const idx = nomes.findIndex(s => nome.includes(s));
  return idx >= 0 ? EMOJIS[idx] : '🌀';
}


function getSeloIconURL(nomeCompleto) {
  const partes = nomeCompleto.split(' ');
  const nomeBase = partes.slice(0, -1).join(' ');
  const mapa = {
    'Dragão': './assets/icons/dragao.png',
    'Vento': './assets/icons/vento.png',
    'Noite': './assets/icons/noite.png',
    'Semente': './assets/icons/semente.png',
    'Serpente': './assets/icons/serpente.png',
    'Enlaçador': './assets/icons/enlacador.png',
    'Enlaçador de Mundos': './assets/icons/enlacador.png',
    'Mão': './assets/icons/mao.png',

function getSeloBase(nomeCompleto) {
  const partes = nomeCompleto.split(' ');
  return partes.slice(0, -1).join(' ');
}

function getSeloCor(nomeCompleto) {
  const partes = nomeCompleto.split(' ');
  return partes[partes.length - 1].toLowerCase();
}

function concordar(selo, tom) {
  for (let p of FEMININOS) {
    if (selo.includes(p)) {
      return tom
        .replace('Magnético', 'Magnética')
        .replace('Lunar', 'Lunar')
        .replace('Elétrico', 'Elétrica')
        .replace('Autoexistente', 'Autoexistente')
        .replace('Overtone', 'Overtone')
        .replace('Rítmico', 'Rítmica')
        .replace('Ressonante', 'Ressonante')
        .replace('Galáctico', 'Galáctica')
        .replace('Solar', 'Solar')
        .replace('Planetário', 'Planetária')
        .replace('Espectral', 'Espectral')
        .replace('Cristal', 'Cristal')
        .replace('Cósmico', 'Cósmica');
    }
  }
  return tom;
}

// CÁLCULOS DE DATA
function isLeapDay(d) {
  return d.getMonth() === 1 && d.getDate() === 29;
}

function daysBetween(f, t) {
  if (f > t) return -daysBetween(t, f);
  let c = 0;
  const d = new Date(f.getTime());
  while (d < t) {
    d.setDate(d.getDate() + 1);
    if (!isLeapDay(d)) c++;
  }
  return c;
}

function dateToKin(dt) {
  if (isLeapDay(dt)) return dateToKin(new Date(dt.getFullYear(), 1, 28));
  const base = new Date(1987, 6, 26);
  const dias = daysBetween(base, dt);
  return ((34 - 1 + dias) % 260 + 260) % 260 + 1;
}

function getFaseLunar(d) {
  const lc = 29.53;
  const nk = new Date(2000, 0, 6, 18, 14);
  const df = (d - nk) / (1000 * 60 * 60 * 24);
  const ph = (df % lc) / lc;
  if (ph < 0.03 || ph > 0.97) return '🌑 Nova';
  if (ph < 0.28) return '🌒 Crescente';
  if (ph < 0.53) return '🌕 Cheia';
  if (ph < 0.78) return '🌘 Minguante';
  return '🌑 Nova';
}

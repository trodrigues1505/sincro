<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sincronário das 13 Luas - Completo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--bg:#0a0c14;--bg2:#11142a;--card:#161b30;--border:rgba(180,154,240,0.18);--gold:#c9a84c;--text:#ece9f5;--text2:#9892b0;--text3:#6a647a;--radius:12px;--red:#d63b3b;--blue:#3b8ed6;--yellow:#f5c842;--white:#f0f0f0}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;font-size:17px;line-height:1.6;min-height:100vh}
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-box{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:3rem 2rem;max-width:400px;width:100%;text-align:center}
.login-box h1{font-family:'Cinzel',serif;font-size:1.8rem;color:var(--gold);margin-bottom:1rem}
.login-box p{color:var(--text2);margin-bottom:2rem}
.btn-google{background:#fff;color:#333;border:none;border-radius:8px;padding:12px 24px;font-family:'Cinzel',serif;font-size:0.9rem;cursor:pointer;display:inline-flex;align-items:center;gap:10px}
.error-msg{background:rgba(214,59,59,0.1);border:0.5px solid var(--red);color:var(--red);padding:1rem;border-radius:8px;margin-top:1rem;font-size:0.9rem}
.loading{color:var(--text2);margin-top:1rem}
.container{max-width:1400px;margin:0 auto;padding:2rem 1.5rem;display:none}
.container.active{display:block}
h1{font-family:'Cinzel',serif;font-size:2rem;color:var(--gold);text-align:center;margin-bottom:0.5rem}
.user-bar{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.user-avatar{width:40px;height:40px;border-radius:50%;border:2px solid var(--gold)}
.btn-logout,.btn-admin,.btn-export{background:rgba(180,154,240,0.1);border:0.5px solid var(--border);border-radius:8px;color:var(--text2);padding:8px 16px;font-family:'Cinzel',serif;font-size:0.75rem;cursor:pointer;text-transform:uppercase}
.btn-admin{border-color:var(--gold);color:var(--gold)}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border)}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:'Cinzel',serif;font-size:0.75rem;padding:12px 20px;cursor:pointer;text-transform:uppercase}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-content{display:none}
.tab-content.active{display:block}
.section{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.kin-hero{text-align:center;padding:2rem;background:linear-gradient(135deg,var(--bg2),var(--bg));border-radius:var(--radius);margin-bottom:1.5rem;border:0.5px solid var(--border)}
.kin-title{font-family:'Cinzel',serif;font-size:2rem;margin:1rem 0;letter-spacing:0.05em;color:var(--gold);line-height:1.3}
.kin-subtitle{color:var(--text2);font-size:0.9rem}
.kin-frase{color:var(--gold);font-size:1.15rem;font-style:italic;margin:1.5rem auto;padding:1.5rem;background:rgba(201,168,76,0.08);border-left:3px solid var(--gold);border-radius:4px;max-width:800px;line-height:1.8}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin:1.5rem 0}
.card{background:var(--bg2);border-radius:8px;padding:1.2rem;border:0.5px solid var(--border)}
.card-label{font-size:0.75rem;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.card-val{font-family:'Cinzel',serif;font-size:1rem;color:var(--text)}
.selo-icon{width:80px;height:80px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;border:3px solid;margin:0 auto 1rem auto}
.selo-red{background:rgba(214,59,59,0.3);border-color:var(--red)}
.selo-white{background:rgba(240,240,240,0.2);border-color:var(--white)}
.selo-blue{background:rgba(59,142,214,0.3);border-color:var(--blue)}
.selo-yellow{background:rgba(245,200,66,0.3);border-color:var(--yellow)}
.oraculo-container{display:flex;justify-content:center;align-items:center;margin:2rem 0;position:relative;min-height:400px}
.oraculo-item{position:absolute;text-align:center}
.oraculo-central{width:140px}
.oraculo-side{width:110px}
.oraculo-guia{top:0;left:50%;transform:translateX(-50%)}
.oraculo-analogo{left:0;top:50%;transform:translateY(-50%)}
.oraculo-antipoda{bottom:0;left:50%;transform:translateX(-50%)}
.oraculo-oculto{right:0;top:50%;transform:translateY(-50%)}
.oraculo-nome{font-size:0.75rem;margin-top:0.5rem;color:var(--text2);font-family:'Cinzel',serif}
.onda-L{display:grid;grid-template-columns:repeat(4,70px);grid-template-rows:repeat(4,70px);gap:8px;margin:1.5rem auto;width:fit-content}
.onda-L .onda-kin:nth-child(1){grid-column:1;grid-row:1}
.onda-L .onda-kin:nth-child(2){grid-column:2;grid-row:1}
.onda-L .onda-kin:nth-child(3){grid-column:3;grid-row:1}
.onda-L .onda-kin:nth-child(4){grid-column:4;grid-row:1}
.onda-L .onda-kin:nth-child(5){grid-column:1;grid-row:2}
.onda-L .onda-kin:nth-child(6){grid-column:1;grid-row:3}
.onda-L .onda-kin:nth-child(7){grid-column:1;grid-row:4}
.onda-L .onda-kin:nth-child(8){grid-column:2;grid-row:4}
.onda-L .onda-kin:nth-child(9){grid-column:3;grid-row:4}
.onda-L .onda-kin:nth-child(10){grid-column:4;grid-row:2}
.onda-L .onda-kin:nth-child(11){grid-column:4;grid-row:3}
.onda-L .onda-kin:nth-child(12){grid-column:4;grid-row:4}
.onda-L .onda-kin:nth-child(13){grid-column:2/4;grid-row:2/4;width:auto;height:auto;font-size:3rem;border-width:4px}
.onda-kin{width:70px;height:70px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2rem;border:3px solid;cursor:pointer;transition:all 0.2s}
.onda-kin:hover{transform:scale(1.05)}
.onda-kin.active{box-shadow:0 0 20px rgba(201,168,76,0.6);border-color:var(--gold)!important}
.cor-red{background:rgba(214,59,59,0.3);border-color:var(--red)}
.cor-white{background:rgba(240,240,240,0.2);border-color:var(--white)}
.cor-blue{background:rgba(59,142,214,0.3);border-color:var(--blue)}
.cor-yellow{background:rgba(245,200,66,0.3);border-color:var(--yellow)}
.semana-label{text-align:center;font-size:0.75rem;color:var(--text3);margin-top:0.5rem;text-transform:uppercase}
.praticas-list{list-style:none;padding:0}
.praticas-list li{padding:0.8rem 1rem;margin-bottom:0.5rem;background:var(--bg2);border-radius:6px;border-left:3px solid var(--gold);display:flex;align-items:center;gap:10px}
.praticas-list li:before{content:'♥';color:var(--gold);font-size:1.2rem}
.hidden{display:none}
input[type="date"]{background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font-family:inherit;color-scheme:dark;max-width:200px}
.btn-calc{background:linear-gradient(135deg,rgba(138,110,220,0.2),rgba(201,168,76,0.15));border:0.5px solid var(--gold);border-radius:8px;color:var(--gold);font-family:'Cinzel',serif;font-size:0.75rem;padding:10px 22px;cursor:pointer;text-transform:uppercase}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:1.5rem}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem}
.tooltip{position:relative;cursor:help}
.tooltip:hover::after{content:attr(data-tooltip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);padding:0.5rem 1rem;border-radius:4px;border:0.5px solid var(--border);white-space:nowrap;z-index:1000;margin-bottom:5px;font-size:0.75rem}
.info-text{color:var(--text2);font-size:0.9rem;line-height:1.6;margin:0.5rem 0}
.info-box{background:var(--bg2);padding:1rem;border-radius:8px;border-left:3px solid var(--blue);margin:1rem 0}
.lua-dia{width:32px;height:32px;background:var(--bg2);border:2px solid;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:bold}
.lua-dia.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.lua-red{border-color:var(--red);color:var(--red)}
.lua-white{border-color:var(--white);color:var(--white)}
.lua-blue{border-color:var(--blue);color:var(--blue)}
.lua-yellow{border-color:var(--yellow);color:var(--yellow)}
.lua-red.active,.lua-white.active,.lua-blue.active,.lua-yellow.active{color:var(--bg)}

/* MEDIA QUERIES RESPONSIVAS */
@media (max-width: 768px) {
  body { font-size: 16px; }
  .container { padding: 1.5rem 1rem; max-width: 100%; }
  h1 { font-size: 1.6rem; margin-bottom: 0.3rem; }
  .user-bar { padding: 1rem; gap: 8px; }
  .btn-logout, .btn-admin, .btn-export { padding: 6px 12px; font-size: 0.7rem; }
  .section { padding: 1.2rem; margin-bottom: 1rem; }
  .section h2 { font-size: 1rem; margin-bottom: 0.8rem; }
  .kin-title { font-size: 1.5rem; }
  .kin-frase { font-size: 1rem; padding: 1.2rem; margin: 1rem auto; }
  .cards { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
  .card { padding: 1rem; }
  .grid-2 { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
  .onda-L { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 330px; margin: 1.5rem auto; width: 100%; }
  .onda-kin { width: 60px !important; height: 60px !important; font-size: 1.8rem !important; border-width: 2px !important; }
  .onda-L .onda-kin { position: relative !important; grid-column: unset !important; grid-row: unset !important; }
  .onda-L .onda-kin:nth-child(13) { font-size: 2.5rem !important; border-width: 3px !important; }
  .oraculo-container { min-height: 300px; }
  .oraculo-central { width: 110px; }
  .oraculo-side { width: 90px; }
  input[type="date"] { max-width: 100%; width: 100%; }
  .tab { padding: 10px 14px; font-size: 0.7rem; }
  .tabs { gap: 4px; }
  .praticas-list li { padding: 0.7rem 0.9rem; font-size: 0.9rem; }
}

@media (max-width: 480px) {
  html { font-size: 14px; }
  body { font-size: 14px; line-height: 1.5; }
  .login-container { padding: 1rem; }
  .login-box { padding: 2rem 1.5rem; }
  .login-box h1 { font-size: 1.5rem; }
  .login-box p { font-size: 0.9rem; margin-bottom: 1.5rem; }
  .btn-google { padding: 10px 16px; font-size: 0.8rem; width: 100%; justify-content: center; }
  .container { padding: 1rem 0.75rem; margin: 0; }
  h1 { font-size: 1.3rem; margin-bottom: 0.25rem; }
  p { font-size: 0.8rem; }
  .user-bar { flex-direction: column; align-items: flex-start; padding: 0.8rem; gap: 8px; }
  .user-info { width: 100%; }
  .user-bar > div:last-child { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .btn-logout, .btn-admin, .btn-export { padding: 6px 10px; font-size: 0.65rem; width: 100%; text-align: center; }
  .section { padding: 1rem; margin-bottom: 0.8rem; border-radius: 8px; }
  .section h2 { font-size: 0.95rem; margin-bottom: 0.7rem; }
  .kin-hero { padding: 1.2rem 1rem; margin-bottom: 1rem; }
  .kin-title { font-size: 1.2rem; margin: 0.8rem 0; }
  .kin-subtitle { font-size: 0.75rem; }
  .kin-frase { font-size: 0.9rem; padding: 1rem; margin: 0.8rem auto; border-left: 2px solid var(--gold); }
  .cards { grid-template-columns: 1fr; gap: 8px; margin: 1rem 0; }
  .card { padding: 0.8rem; }
  .card-label { font-size: 0.65rem; margin-bottom: 4px; }
  .card-val { font-size: 0.9rem; }
  .selo-icon { width: 60px; height: 60px; font-size: 2rem; margin: 0 auto 0.8rem; }
  .onda-L { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; max-width: 280px; margin: 1rem auto; }
  .onda-kin { width: 50px !important; height: 50px !important; font-size: 1.5rem !important; border-width: 2px !important; border-radius: 8px !important; }
  .onda-L .onda-kin:nth-child(13) { font-size: 2rem !important; border-width: 2px !important; width: 50px !important; height: 50px !important; }
  .semana-label { font-size: 0.6rem; margin-top: 4px; }
  .oraculo-container { min-height: 220px; margin: 1rem 0; }
  .oraculo-central { width: 80px; font-size: 0.8rem; }
  .oraculo-side { width: 70px; font-size: 0.7rem; }
  .oraculo-nome { font-size: 0.6rem; margin-top: 4px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; gap: 0.8rem; }
  input[type="date"] { max-width: 100%; width: 100%; padding: 8px 10px; font-size: 0.9rem; }
  .btn-calc { padding: 8px 16px; font-size: 0.65rem; width: 100%; margin-top: 8px; }
  .tabs { gap: 2px; margin-bottom: 1rem; }
  .tab { padding: 8px 10px; font-size: 0.65rem; }
  .tab-content { margin: 0; }
  .praticas-list { padding: 0; }
  .praticas-list li { padding: 0.6rem 0.8rem; margin-bottom: 4px; font-size: 0.85rem; gap: 8px; }
  .praticas-list li:before { font-size: 1rem; }
  .info-box { padding: 0.8rem; margin: 0.8rem 0; font-size: 0.85rem; }
  .info-text { font-size: 0.8rem; margin: 0.3rem 0; }
  @supports (hover: none) {
    .tooltip:hover::after { display: none; }
    .tooltip { border-bottom: 1px dashed var(--gold); }
  }
  .lua-dia { width: 28px; height: 28px; font-size: 0.6rem; }
  .section.hidden-mobile { display: none; }
}

@media (max-width: 360px) {
  .container { padding: 0.8rem 0.5rem; }
  h1 { font-size: 1.1rem; }
  .onda-L { max-width: 250px; gap: 5px; }
  .onda-kin { width: 45px !important; height: 45px !important; font-size: 1.3rem !important; border-width: 1px !important; }
  .onda-L .onda-kin:nth-child(13) { font-size: 1.8rem !important; }
  .btn-logout, .btn-admin, .btn-export { padding: 5px 8px; font-size: 0.6rem; }
}

@media (max-height: 500px) and (orientation: landscape) {
  .kin-hero { padding: 1rem; margin-bottom: 0.8rem; }
  .kin-title { font-size: 1.3rem; margin: 0.5rem 0; }
  .kin-frase { font-size: 0.85rem; padding: 0.8rem; margin: 0.5rem auto; }
  .oraculo-container { min-height: 280px; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

@media (prefers-contrast: more) {
  :root { --border: rgba(180,154,240,0.35); --text3: #8a8799; }
}

</style>
</head>
<body>

<div id="login-screen" class="login-container">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/js-joda@1.11.0/dist/js-joda.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-joda-timezone@2.3.0/dist/js-joda-timezone.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDOf77LceD2eKXlewRxxJT60hiBIlRJrJY",
  authDomain: "sincro13luas.firebaseapp.com",
  projectId: "sincro13luas",
  storageBucket: "sincro13luas.firebasestorage.app",
  messagingSenderId: "886057704979",
  appId: "1:886057704979:web:31b8348110ff8649c369e6"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

let currentUser = null;

auth.onAuthStateChanged(async (user) => {
  if (user) {
    const userDoc = await db.collection('users').doc(user.uid).get();
    if (!userDoc.exists || !userDoc.data().authorized) {
      alert('❌ Sua conta está aguardando autorização do administrador.');
      auth.signOut();
      return;
    }
    currentUser = user;
    document.getElementById('user-avatar').src = user.photoURL || '';
    document.getElementById('user-name').textContent = user.displayName;
    const role = userDoc.data().role || 'usuário';
    document.getElementById('user-role').textContent = role === 'admin' ? '👑 ADMIN' : role;
    if (role === 'admin') document.getElementById('btn-admin').classList.remove('hidden');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').classList.add('active');
    loadToday();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').classList.remove('active');
  }
});

document.getElementById('btn-login').addEventListener('click', () => {
  document.getElementById('login-loading').classList.remove('hidden');
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => {
    document.getElementById('login-error').textContent = '❌ Erro ao fazer login: ' + err.message;
    document.getElementById('login-error').classList.remove('hidden');
    document.getElementById('login-loading').classList.add('hidden');
  });
});

document.getElementById('btn-logout').addEventListener('click', () => auth.signOut());

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

async function dateToKin(date) {
  const baseDate = new Date(1987, 7, 13);
  const diffTime = Math.abs(date - baseDate);
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  const kin = (diffDays % 260) + 1;
  const snapshot = await db.collection('sincronario').doc('dados').get();
  const allKins = snapshot.data().kins || [];
  return allKins[kin - 1] || { kin, seal: '?' };
}

function calcNatal() {
  const v = document.getElementById('nasc-inp').value;
  if (!v) return;
  const [y, m, d] = v.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  dateToKin(dt).then(k => {
    document.getElementById('res-natal').innerHTML = kinHTML(k);
    document.getElementById('res-natal').classList.remove('hidden');
  });
}

function loadToday() {
  dateToKin(new Date()).then(k => {
    document.getElementById('res-dia').innerHTML = kinHTML(k);
  });
}

function exportPNG() {
  const element = document.getElementById('export-area');
  html2canvas(element, { backgroundColor: '#0a0c14', scale: 2 }).then(canvas => {
    const link = document.createElement('a');
    link.href = canvas.toDataURL();
    link.download = 'sincronario-kin-' + new Date().toISOString().slice(0, 10) + '.png';
    link.click();
  });
}

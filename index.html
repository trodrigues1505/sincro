<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sincronário das 13 Luas</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#009739">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="13 Luas">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#071209;--bg2:#0a1a0c;--card:#0d1f0f;--card2:#112613;
  --green:#009739;--green2:#00b544;--green3:#006828;
  --gold:#A57C00;--gold2:#c9a030;--gold3:#e0c070;
  --border:rgba(0,151,57,.20);--border2:rgba(0,151,57,.40);--border-g:rgba(165,124,0,.28);
  --text:#c0dcc4;--text2:#5a8860;--text3:#2e5034;
  --red:#8a2018;--white:#a8b890;--blue:#1a4860;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;font-size:16px;line-height:1.65;min-height:100vh}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.anim-1{animation:fadeUp .28s .00s both}.anim-2{animation:fadeUp .28s .08s both}
.anim-3{animation:fadeUp .28s .16s both}.anim-4{animation:fadeUp .28s .24s both}
.anim-5{animation:fadeUp .28s .32s both}

.skel{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite;border-radius:6px}
.skel-title{height:28px;width:65%;margin:0 auto 12px}
.skel-sub{height:14px;width:40%;margin:0 auto 20px}
.skel-frase{height:60px;width:100%;margin-top:16px}
.skel-row{height:16px;width:100%;margin-bottom:8px}
.skel-row.w70{width:70%}

.login-container{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:max(1.5rem,env(safe-area-inset-top,0px)) 1.5rem 1.5rem;gap:1.8rem}
.login-logo{width:96px;height:96px;border-radius:20px;animation:fadeUp .35s both;opacity:.95;box-shadow:0 0 40px rgba(0,151,57,.18)}
.login-box{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:2rem 2.4rem 2.4rem;max-width:360px;width:100%;text-align:center;animation:fadeUp .4s .08s both}
.login-box h1{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--gold2);margin-bottom:.3rem;letter-spacing:.06em}
.login-divider{width:24px;height:1px;background:var(--gold);margin:.9rem auto;opacity:.5}
.login-box p{color:var(--text3);margin-bottom:1.7rem;font-size:.83rem}
.btn-google{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px 20px;font-family:'Cinzel',serif;font-size:.76rem;cursor:pointer;display:inline-flex;align-items:center;gap:10px;transition:border-color .2s,color .2s;letter-spacing:.04em}
.btn-google:hover{border-color:var(--green2);color:var(--text)}
.error-msg{background:rgba(138,32,24,.12);border:1px solid rgba(138,32,24,.3);color:#b06858;padding:.7rem .9rem;border-radius:6px;margin-top:1rem;font-size:.82rem}
.loading{color:var(--text3);margin-top:1rem;font-style:italic;font-size:.84rem}

.container{max-width:960px;margin:0 auto;padding:max(1rem,env(safe-area-inset-top,0px)) 1rem 1rem;display:none}
.container.active{display:block}
h1{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--gold2);text-align:center;margin-bottom:.2rem;letter-spacing:.06em}

.user-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem 1rem;margin-bottom:.9rem;margin-top:env(safe-area-inset-top,0px);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:7px}
.user-avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--green3)}
.btn-logout,.btn-admin,.btn-export{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text2);padding:5px 11px;font-family:'Cinzel',serif;font-size:.6rem;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;transition:all .2s}
.btn-logout:hover,.btn-export:hover{border-color:var(--green3);color:var(--text2)}
.btn-admin{border-color:var(--border-g);color:var(--gold)}
.btn-admin:hover{background:rgba(165,124,0,.12);border-color:var(--gold2)}

.tabs{display:flex;margin-bottom:.9rem;border-bottom:1px solid var(--border)}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);font-family:'Cinzel',serif;font-size:.62rem;padding:8px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:.09em;transition:color .2s,border-color .2s;margin-bottom:-1px}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold)}
.tab-content{display:none}.tab-content.active{display:block}

.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:.6rem}
.section-title{font-family:'Cinzel',serif;font-size:.6rem;color:var(--gold);text-transform:uppercase;letter-spacing:.13em;margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem}
.section-title::after{content:'';flex:1;height:1px;background:var(--border-g)}

.kin-hero{text-align:center;padding:1.4rem 1.3rem 1.2rem;background:var(--card2);border-radius:var(--radius);margin-bottom:.6rem;border:1px solid var(--border2);position:relative;overflow:hidden}
.kin-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green3),var(--green2),var(--green3),transparent)}
.kin-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.45}
.kin-num{font-family:'Cinzel',serif;font-size:.58rem;color:rgba(165,124,0,.7);letter-spacing:.16em;text-transform:uppercase;margin-bottom:.5rem}
.kin-title{font-family:'Cinzel',serif;font-size:1.4rem;margin:.25rem 0 .35rem;letter-spacing:.03em;color:var(--gold2);line-height:1.2}
.kin-subtitle{color:rgba(165,124,0,.65);font-size:.65rem;text-transform:uppercase;letter-spacing:.1em}
.kin-frase{color:var(--text);font-size:.9rem;font-style:italic;margin:.9rem auto 0;padding:.85rem 1.1rem;background:rgba(0,151,57,.08);border-left:2px solid var(--gold3);max-width:640px;line-height:1.9}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:6px;margin:.8rem 0}
.card{background:var(--bg2);border-radius:6px;padding:.85rem .95rem;border:1px solid var(--border);transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-label{font-size:.58rem;color:var(--text2);text-transform:uppercase;letter-spacing:.11em;margin-bottom:4px}
.card-val{font-family:'Cinzel',serif;font-size:.84rem;color:var(--gold3)}

.selo-icon{border-radius:6px;display:flex;align-items:center;justify-content:center;border:1px solid;margin:0 auto .5rem;overflow:hidden}
.selo-red,.selo-vermelho,.selo-vermelha{background:rgba(138,32,24,.13);border-color:rgba(138,32,24,.35)}
.selo-white,.selo-branco,.selo-branca{background:rgba(168,184,144,.07);border-color:rgba(168,184,144,.2)}
.selo-blue,.selo-azul{background:rgba(26,72,96,.13);border-color:rgba(26,72,96,.35)}
.selo-yellow,.selo-amarelo,.selo-amarela{background:rgba(165,124,0,.11);border-color:rgba(165,124,0,.3)}

/* ORÁCULO SVG */
.oraculo-svg-wrap{position:relative;width:100%;max-width:340px;margin:.7rem auto;aspect-ratio:1/1}
.oraculo-svg-lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.oraculo-svg-lines line{stroke:var(--green3);stroke-width:1;opacity:.35;stroke-dasharray:3 4}
.oraculo-svg-lines line.strong{opacity:.55;stroke-dasharray:none}
@keyframes oraculoPulse{0%,100%{opacity:.15}50%{opacity:.4}}
.oraculo-svg-lines circle{fill:none;stroke:var(--gold);stroke-width:1;opacity:.2;animation:oraculoPulse 4s ease-in-out infinite}
.oraculo-svg-wrap .oraculo-grid{position:absolute;inset:0;width:100%;height:100%;z-index:1;margin:0;max-width:none;display:grid;grid-template-columns:1fr auto 1fr;grid-template-rows:1fr auto 1fr}
.oraculo-cell-top{grid-column:2;grid-row:1;align-self:start;padding-top:4px}
.oraculo-cell-left{grid-column:1;grid-row:2;justify-self:start;padding-left:4px}
.oraculo-cell-center{grid-column:2;grid-row:2}
.oraculo-cell-right{grid-column:3;grid-row:2;justify-self:end;padding-right:4px}
.oraculo-cell-bottom{grid-column:2;grid-row:3;align-self:end;padding-bottom:4px}
.oraculo-item{text-align:center}
.oraculo-central .selo-icon{width:78px;height:78px;border-radius:8px}
.oraculo-side .selo-icon{width:56px;height:56px;border-radius:6px}
.oraculo-nome{font-size:.54rem;margin-top:.28rem;color:var(--text2);font-family:'Cinzel',serif;letter-spacing:.04em;line-height:1.3}

/* ONDA */
.onda-wrap{display:flex;justify-content:center;margin:.7rem 0}
.onda-L{display:grid;grid-template-columns:repeat(4,var(--cell));grid-template-rows:repeat(4,var(--cell));--cell:56px;gap:4px}
.onda-L .onda-kin:nth-child(1){grid-column:1;grid-row:1}
.onda-L .onda-kin:nth-child(2){grid-column:2;grid-row:1}
.onda-L .onda-kin:nth-child(3){grid-column:3;grid-row:1}
.onda-L .onda-kin:nth-child(4){grid-column:4;grid-row:1}
.onda-L .onda-kin:nth-child(5){grid-column:1;grid-row:2}
.onda-L .onda-kin:nth-child(6){grid-column:1;grid-row:3}
.onda-L .onda-kin:nth-child(7){grid-column:1;grid-row:4}
.onda-L .onda-kin:nth-child(8){grid-column:2;grid-row:4}
.onda-L .onda-kin:nth-child(9){grid-column:3;grid-row:4}
.onda-L .onda-kin:nth-child(10){grid-column:4;grid-row:2}
.onda-L .onda-kin:nth-child(11){grid-column:4;grid-row:3}
.onda-L .onda-kin:nth-child(12){grid-column:4;grid-row:4}
.onda-L .onda-kin:nth-child(13){grid-column:2/4;grid-row:2/4;width:auto;height:auto}
.onda-kin{width:var(--cell);height:var(--cell);border-radius:5px;display:flex;align-items:center;justify-content:center;border:1px solid;cursor:pointer;overflow:hidden;transition:transform .14s,box-shadow .14s}
.onda-kin:hover{transform:scale(1.09)}
.onda-kin.active{box-shadow:0 0 0 2px var(--green);border-color:var(--green)!important}
.cor-red,.cor-vermelho,.cor-vermelha{background:rgba(138,32,24,.13);border-color:rgba(138,32,24,.35)}
.cor-white,.cor-branco,.cor-branca{background:rgba(168,184,144,.05);border-color:rgba(168,184,144,.18)}
.cor-blue,.cor-azul{background:rgba(26,72,96,.13);border-color:rgba(26,72,96,.35)}
.cor-yellow,.cor-amarelo,.cor-amarela{background:rgba(165,124,0,.11);border-color:rgba(165,124,0,.3)}

.praticas-list{list-style:none;padding:0}
.praticas-list li{padding:.6rem .85rem;margin-bottom:4px;background:var(--bg2);border-radius:5px;border-left:2px solid var(--green);display:flex;align-items:flex-start;gap:8px;font-size:.86rem;line-height:1.5;transition:border-color .2s}
.praticas-list li:hover{border-left-color:var(--gold)}
.praticas-list li::before{content:'·';color:var(--green2);font-size:1.1rem;flex-shrink:0;line-height:1.3}

.hidden{display:none}
input[type="date"]{background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-family:inherit;color-scheme:dark;font-size:.87rem;transition:border-color .2s}
input[type="date"]:focus{outline:none;border-color:var(--green)}
.btn-calc{background:transparent;border:1px solid var(--border-g);border-radius:5px;color:var(--gold2);font-family:'Cinzel',serif;font-size:.63rem;padding:7px 15px;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;transition:all .2s}
.btn-calc:hover{background:var(--green);color:#fff;border-color:var(--green)}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:.6rem}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.55rem}
.tooltip{position:relative;cursor:help}
.tooltip:hover::after{content:attr(data-tooltip);position:absolute;bottom:calc(100%+5px);left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text2);padding:.3rem .7rem;border-radius:4px;border:1px solid var(--border);white-space:nowrap;z-index:1000;font-size:.63rem}
.info-text{color:var(--text);font-size:.82rem;line-height:1.65;margin:.28rem 0}
.info-box{background:var(--bg2);padding:.75rem .85rem;border-radius:5px;border-left:2px solid var(--gold);margin:.55rem 0}

/* LUA CIRCULAR SVG */
.lua-circular{width:100%;max-width:260px;margin:0 auto;display:block}
.lua-circular .seg{fill:var(--bg2);stroke-width:1;transition:fill .2s,stroke .2s}
.lua-circular .seg.red   {stroke:rgba(138,32,24,.38)}
.lua-circular .seg.white {stroke:rgba(168,184,144,.2)}
.lua-circular .seg.blue  {stroke:rgba(26,72,96,.38)}
.lua-circular .seg.yellow{stroke:rgba(165,124,0,.32)}
.lua-circular .seg.active{fill:var(--gold);stroke:var(--gold2)}
.lua-circular .seg-label{font-family:'Cinzel',serif;font-size:6px;fill:var(--text3);pointer-events:none;text-anchor:middle;dominant-baseline:central}
.lua-circular .seg-label.active{fill:#1a1000;font-weight:600}
.lua-circular .ring-label{font-family:'Cinzel',serif;font-size:5px;fill:var(--text3);text-transform:uppercase;letter-spacing:.1em;text-anchor:middle;dominant-baseline:central}
.lua-circular .center-text{font-family:'Cinzel',serif;fill:var(--green2);text-anchor:middle}
.lua-circular .center-num{font-size:18px;dominant-baseline:central}
.lua-circular .center-sub{font-size:5px;fill:var(--text3);letter-spacing:.1em;dominant-baseline:central}


/* ── PERFIL ── */
.perfil-hero{text-align:center;padding:1.5rem;background:var(--card2);border-radius:var(--radius);margin-bottom:.6rem;border:1px solid var(--border2)}
.perfil-avatar{width:64px;height:64px;border-radius:50%;border:2px solid var(--gold);margin:0 auto .7rem;display:block}
.perfil-nome{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold2);margin-bottom:.2rem}
.perfil-email{font-size:.72rem;color:var(--text3);margin-bottom:1rem}
.perfil-kin-card{background:var(--bg2);border:1px solid var(--border-g);border-radius:8px;padding:1rem;text-align:center;margin-bottom:.6rem}
.perfil-kin-label{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
.perfil-kin-nome{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold2);margin-bottom:.2rem}
.perfil-kin-sub{font-size:.72rem;color:var(--text2)}
.perfil-sem-kin{color:var(--text3);font-style:italic;font-size:.88rem;padding:1.2rem 0}
.btn-salvar-natal{background:transparent;border:1px solid var(--border-g);border-radius:5px;color:var(--gold2);font-family:'Cinzel',serif;font-size:.63rem;padding:7px 15px;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;transition:all .2s;margin-top:.6rem}
.btn-salvar-natal:hover{background:rgba(165,124,0,.15);border-color:var(--gold2)}
.btn-limpar-natal{background:transparent;border:1px solid rgba(138,32,24,.35);border-radius:5px;color:rgba(138,32,24,.8);font-family:'Cinzel',serif;font-size:.6rem;padding:6px 12px;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;transition:all .2s;margin-top:.4rem}
.btn-limpar-natal:hover{background:rgba(138,32,24,.12)}
.notif-banner{background:var(--card2);border:1px solid var(--border-g);border-radius:8px;padding:.9rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap;margin-bottom:.6rem}
.notif-banner p{color:var(--text2);font-size:.82rem;flex:1}
.btn-notif{background:var(--green);border:none;border-radius:5px;color:#fff;font-family:'Cinzel',serif;font-size:.63rem;padding:7px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .2s;white-space:nowrap}
.btn-notif:hover{background:var(--green2)}
.btn-notif.ativo{background:transparent;border:1px solid var(--green3);color:var(--green2)}

/* ── SELOS ── */
.selos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.6rem;margin-top:.3rem}
.selo-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.9rem .8rem;text-align:center;cursor:pointer;transition:border-color .2s,transform .15s}
.selo-card:hover{border-color:var(--border-g);transform:translateY(-2px)}
.selo-card-icon{width:48px;height:48px;border-radius:7px;margin:0 auto .5rem;overflow:hidden;border:1px solid}
.selo-card-nome{font-family:'Cinzel',serif;font-size:.72rem;color:var(--gold2);margin-bottom:.2rem}
.selo-card-acao{font-size:.62rem;color:var(--text3);font-style:italic}

/* ── MODAL SELO ── */
.modal-selo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-selo.active{display:flex}
.modal-selo-box{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:1.5rem;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;animation:fadeUp .25s both}
.modal-selo-header{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.modal-selo-icon{width:64px;height:64px;border-radius:9px;overflow:hidden;border:1px solid;flex-shrink:0}
.modal-selo-titulo{font-family:'Cinzel',serif;font-size:1.05rem;color:var(--gold2);margin-bottom:.2rem}
.modal-selo-acao{font-size:.72rem;color:var(--green2);text-transform:uppercase;letter-spacing:.08em}
.modal-selo-maya{font-size:.68rem;color:var(--text3);margin-top:.15rem}
.modal-selo-desc{color:var(--text);font-size:.88rem;line-height:1.75}
.modal-selo-close{position:absolute;top:1rem;right:1rem;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text3);padding:4px 9px;cursor:pointer;font-size:.7rem;transition:all .2s}
.modal-selo-close:hover{border-color:var(--text2);color:var(--text2)}
.modal-selo-box{position:relative}

/* ── SHARE ── */
.btn-share{background:transparent;border:1px solid var(--border-g);border-radius:5px;color:var(--gold);font-family:'Cinzel',serif;font-size:.63rem;padding:7px 15px;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-share:hover{background:rgba(165,124,0,.12);border-color:var(--gold2)}
.export-btns{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-top:.8rem}

@media (max-width:600px){
  body{font-size:15px}.container{padding:.75rem .65rem}h1{font-size:1.2rem}
  .user-bar{padding:.6rem .7rem;flex-direction:column;align-items:flex-start}
  .user-bar>div:last-child{width:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
  .btn-logout,.btn-admin,.btn-export{width:100%;text-align:center;font-size:.56rem;padding:5px 6px}
  .section{padding:.85rem}.kin-hero{padding:1.2rem .9rem 1rem}.kin-title{font-size:1.2rem}
  .kin-frase{font-size:.83rem;padding:.75rem .85rem}
  .oraculo-svg-wrap{max-width:290px}
  .oraculo-central .selo-icon{width:62px;height:62px}.oraculo-side .selo-icon{width:48px;height:48px}
  .oraculo-nome{font-size:.5rem}
  .onda-L{--cell:48px;gap:3px}
  .cards{grid-template-columns:1fr 1fr;gap:5px}
  .grid-2,.grid-3{grid-template-columns:1fr;gap:.55rem}
  input[type="date"]{width:100%}.btn-calc{width:100%;margin-top:5px}
  .tab{padding:7px 10px;font-size:.58rem}
  .lua-circular{max-width:220px}
}
@media (max-width:400px){
  .container{padding:.65rem .5rem}h1{font-size:1rem}.kin-title{font-size:1rem}
  .oraculo-svg-wrap{max-width:256px}
  .oraculo-central .selo-icon{width:54px;height:54px}.oraculo-side .selo-icon{width:42px;height:42px}
  .onda-L{--cell:40px;gap:3px}.cards{grid-template-columns:1fr}
  .lua-circular{max-width:190px}
}
@media (max-height:500px) and (orientation:landscape){
  .kin-hero{padding:.75rem .9rem}.kin-title{font-size:1.05rem}.kin-frase{font-size:.78rem;padding:.6rem}
}

// CÁLCULOS DE DATA
function isLeapDay(d) {
  return d.getMonth() === 1 && d.getDate() === 29;
}

function daysBetween(f, t) {
  if (f > t) return -daysBetween(t, f);
  let c = 0;
  const d = new Date(f.getTime());
  while (d < t) {
    d.setDate(d.getDate() + 1);
    if (!isLeapDay(d)) c++;
  }
  return c;
}

function dateToKin(dt) {
  if (isLeapDay(dt)) return dateToKin(new Date(dt.getFullYear(), 1, 28));
  const dtNorm = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
  const base = new Date(1987, 6, 26);
  const dias = daysBetween(base, dtNorm);
  return ((34 - 1 + dias) % 260 + 260) % 260 + 1;
}

function getFaseLunar(d) {
  const lc = 29.53;
  const nk = new Date(2000, 0, 6, 18, 14);
  const df = (d - nk) / (1000 * 60 * 60 * 24);
  const ph = (df % lc) / lc;
  if (ph < 0.03 || ph > 0.97) return '🌑 Nova';
  if (ph < 0.28) return '🌒 Crescente';
  if (ph < 0.53) return '🌕 Cheia';
  if (ph < 0.78) return '🌘 Minguante';
  return '🌑 Nova';
}

function gerarLuaCircular(diaAtivo) {
  const cores = ['red','white','blue','yellow'];
  const nomes = ['VERMELHA','BRANCA','AZUL','AMARELA'];
  const cx = 100, cy = 100, rOut = 88, rIn = 58, rLbl = 73, rRing = 95;
  let segs = '', labels = '', ringLabels = '';
  for (let i = 0; i < 28; i++) {
    const dia = i + 1;
    const cor = cores[Math.floor(i / 7)];
    const a1 = (i * 360/28 - 90) * Math.PI/180;
    const a2 = ((i+1) * 360/28 - 90) * Math.PI/180;
    const x1o = cx + rOut*Math.cos(a1), y1o = cy + rOut*Math.sin(a1);
    const x2o = cx + rOut*Math.cos(a2), y2o = cy + rOut*Math.sin(a2);
    const x1i = cx + rIn *Math.cos(a1), y1i = cy + rIn *Math.sin(a1);
    const x2i = cx + rIn *Math.cos(a2), y2i = cy + rIn *Math.sin(a2);
    const d = `M${x1o.toFixed(1)} ${y1o.toFixed(1)} A${rOut} ${rOut} 0 0 1 ${x2o.toFixed(1)} ${y2o.toFixed(1)} L${x2i.toFixed(1)} ${y2i.toFixed(1)} A${rIn} ${rIn} 0 0 0 ${x1i.toFixed(1)} ${y1i.toFixed(1)}Z`;
    const ativo = dia === diaAtivo ? ' active' : '';
    segs += `<path d="${d}" class="seg ${cor}${ativo}"></path>`;
    const am = ((i+0.5)*360/28 - 90)*Math.PI/180;
    const lx = cx + rLbl*Math.cos(am), ly = cy + rLbl*Math.sin(am);
    labels += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" class="seg-label${ativo}">${dia}</text>`;
  }
  for (let s = 0; s < 4; s++) {
    const am = ((s*7+3.5)*360/28-90)*Math.PI/180;
    const lx = cx+rRing*Math.cos(am), ly = cy+rRing*Math.sin(am);
    ringLabels += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" class="ring-label">${nomes[s]}</text>`;
  }
  return `<svg class="lua-circular" viewBox="-12 -12 224 224" xmlns="http://www.w3.org/2000/svg">${segs}${labels}${ringLabels}<text x="${cx}" y="${cy-5}" class="center-text center-num">${diaAtivo}</text><text x="${cx}" y="${cy+14}" class="center-text center-sub">DE 28</text></svg>`;
}

async function calcNatal() {
  await DATA_PRONTO;
  const v = document.getElementById('nasc-inp').value;
  if (!v) return;
  const [y, m, d] = v.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const k = dateToKin(dt);
  document.getElementById('res-natal').innerHTML = kinHTML(k);
  document.getElementById('res-natal').classList.remove('hidden');
}

async function compartilharKin() {
  const area = document.getElementById('export-area');
  const canvas = await html2canvas(area, { backgroundColor: '#071209', scale: 2 });
  canvas.toBlob(async (blob) => {
    const file = new File([blob], 'meu-kin.png', { type: 'image/png' });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        title: 'Sincronário das 13 Luas',
        text: 'Meu Kin do dia 🌀',
        files: [file]
      });
    } else {
      // fallback: download
      const link = document.createElement('a');
      link.download = `kin-${new Date().toISOString().split('T')[0]}.png`;
      link.href = canvas.toDataURL();
      link.click();
    }
  });
}

async function renderSelos() {
  await DATA_PRONTO;
  const grid = document.getElementById('selos-grid');
  if (!grid || grid.children.length > 0) return;
  const selos = DATA.selos || {};
  const keys = Object.keys(selos).sort((a,b) => Number(a)-Number(b));
  if (!keys.length) {
    grid.innerHTML = '<p style="color:var(--text3);font-style:italic;padding:1rem;grid-column:1/-1">Dados não carregados.</p>';
    return;
  }
  keys.forEach(k => {
    const sd = selos[k];
    if (!sd || !sd.nome) return;
    const nomeCompleto = sd.nome;
    const cor  = getSeloCor(nomeCompleto);
    const base = getSeloBase(nomeCompleto);
    const icon = getSeloIconURL(nomeCompleto);
    const card = document.createElement('div');
    card.className = 'selo-card';
    card.innerHTML = `
      <div class="selo-card-icon selo-${cor}" style="width:52px;height:52px">
        <img src="${icon}" alt="${base}" style="width:100%;height:100%;object-fit:contain"
          onerror="this.parentElement.textContent='${getSeloEmoji(nomeCompleto)}'">
      </div>
      <div class="selo-card-nome">${base}</div>
      <div class="selo-card-acao">${sd.acao||''}</div>
    `;
    card.onclick = () => abrirModalSelo(nomeCompleto, cor, icon, sd);
    grid.appendChild(card);
  });
}

function abrirModalSelo(nome, cor, iconURL, dados) {
  const modal = document.getElementById('modal-selo');
  document.getElementById('modal-selo-icon').className = `modal-selo-icon selo-${cor}`;
  document.getElementById('modal-selo-icon').innerHTML = `<img src="${iconURL}" style="width:100%;height:100%;object-fit:contain">`;
  document.getElementById('modal-selo-titulo').textContent = dados.nome || nome;
  document.getElementById('modal-selo-acao').textContent = dados.acao || '';
  document.getElementById('modal-selo-maya').textContent = dados.maya ? `Glifo Maia: ${dados.maya}` : '';
  document.getElementById('modal-selo-desc').textContent = dados.desc || '';
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function fecharModalSelo() {
  document.getElementById('modal-selo').classList.remove('active');
  document.body.style.overflow = '';
}

// Fechar modal clicando fora
document.getElementById('modal-selo').addEventListener('click', function(e) {
  if (e.target === this) fecharModalSelo();
});

let currentUserUID = null;

async function carregarPerfil(user) {
  currentUserUID = user.uid;
  document.getElementById('perfil-avatar').src = user.photoURL || '';
  document.getElementById('perfil-nome').textContent = user.displayName || '';
  document.getElementById('perfil-email').textContent = user.email || '';

  // Carregar kin natal salvo
  try {
    const doc = await db.collection('users').doc(user.uid).get();
    const data = doc.data() || {};
    if (data.kinNatalData) {
      document.getElementById('perfil-nasc-inp').value = data.kinNatalData;
      mostrarKinNatalSalvo(data.kinNatalData, data.kinNatalNum);
    } else {
      document.getElementById('perfil-kin-salvo').innerHTML =
        '<p class="perfil-sem-kin">Nenhum Kin Natal salvo ainda.</p>';
    }
  } catch(e) {
    console.warn('Erro ao carregar perfil:', e);
  }

  // Estado da notificação
  atualizarBotaoNotif();
}

function mostrarKinNatalSalvo(data, kinNum) {
  const dt = new Date(data + 'T12:00:00');
  const k  = kinNum || dateToKin(dt);
  const kd = (DATA.kins || {})[String(k)] || {};
  const [y,mo,dy] = data.split('-');
  const dataFmt = dy+'/'+mo+'/'+y;

  const nomeKin = kd.selo       || 'Kin '+k;
  const tomNome = kd.tom_nome   || '';
  const frase   = kd.frase_curta|| '';
  const cor     = getSeloCor(nomeKin);
  const icon    = getSeloIconURL(nomeKin);
  const orac    = kd.oraculo    || {};
  const tomIdx  = kd.tom        || 0;
  const tomData = (DATA.tons    || {})[String(tomIdx)] || {};

  // Busca desc do selo pelo nome base (inclui variações como "Enlaçador de Mundos")
  // Buscar pelo nome EXATO no selos (não por includes — evita matches errados)
  const seloEntry = Object.values(DATA.selos||{}).find(s => s.nome === nomeKin) || {};

  const html = '<div class="perfil-kin-card">'

    // ── Cabeçalho ──
    + '<div class="perfil-kin-label">Kin '+k+' de 260 · '+dataFmt+'</div>'

    // ── Ícone centrado + nome ──
    + '<div style="text-align:center;padding:.8rem 0 .4rem">'
    +   '<div class="selo-icon selo-'+cor+'" style="width:72px;height:72px;border-radius:10px;margin:0 auto .7rem">'
    +     '<img src="'+icon+'" style="width:100%;height:100%;object-fit:contain">'
    +   '</div>'
    +   '<div class="perfil-kin-nome">'+nomeKin+'</div>'
    +   '<div class="perfil-kin-sub" style="margin-top:.2rem">'+tomNome+(seloEntry.maya?' · '+seloEntry.maya:'')+'</div>'
    +   (seloEntry.acao ? '<div style="font-size:.62rem;color:var(--green2);text-transform:uppercase;letter-spacing:.07em;margin-top:.25rem">'+seloEntry.acao+'</div>' : '')
    + '</div>'

    // ── Frase ──
    + (frase ? '<div style="font-style:italic;color:var(--text);font-size:.88rem;border-left:2px solid var(--gold3);padding:.65rem .9rem;background:rgba(165,124,0,.06);margin:.5rem 0;line-height:1.8">&ldquo;'+frase+'&rdquo;</div>' : '')

    // ── Tom ──
    + (tomData.verbo ? '<div style="background:var(--bg2);border-radius:6px;padding:.7rem .9rem;margin:.5rem 0;border-left:2px solid var(--green3)">'
    +   '<div style="font-family:Cinzel;font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.3rem">Tom '+tomIdx+' · '+tomNome+'</div>'
    +   '<div style="font-size:.85rem;color:var(--text2)">'+tomData.verbo+'</div>'
    +   (tomData.pergunta ? '<div style="font-size:.8rem;color:var(--text3);margin-top:.25rem;font-style:italic">'+tomData.pergunta+'</div>' : '')
    + '</div>' : '')

    // ── Oráculo ──
    + (orac.guia ? '<div style="margin:.6rem 0">'
    +   '<div style="font-family:Cinzel;font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem">Oráculo do Destino</div>'
    +   '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem">'
    +   [['Guia',orac.guia],['Análogo',orac.analogo||''],['Antípoda',orac.antipoda||''],['Oculto',orac.oculto||'']].map(function(pair){
          return '<div style="background:var(--bg2);border-radius:5px;padding:.5rem .7rem">'
            +'<div style="font-size:.56rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem">'+pair[0]+'</div>'
            +'<div style="font-size:.82rem;color:var(--text)">'+pair[1]+'</div>'
            +'</div>';
        }).join('')
    +   '</div>'
    + '</div>' : '')

    // ── Descrição do selo ──
    + (seloEntry.desc ? '<div style="font-size:.83rem;color:var(--text2);line-height:1.8;margin-top:.6rem;padding-top:.6rem;border-top:1px solid var(--border)">'+seloEntry.desc+'</div>' : '')

    + '</div>'
    + '<button class="btn-limpar-natal" onclick="limparKinNatal()">Remover</button>';

  document.getElementById('perfil-kin-salvo').innerHTML = html;
}

async function salvarKinNatal() {
  if (!currentUserUID) return;
  const v = document.getElementById('perfil-nasc-inp').value;
  if (!v) return;
  const dt = new Date(v + 'T12:00:00');
  const k = dateToKin(dt);
  try {
    await db.collection('users').doc(currentUserUID).update({
      kinNatalData: v,
      kinNatalNum: k
    });
    mostrarKinNatalSalvo(v, k);
    // Também atualizar a aba Kin Natal
    document.getElementById('nasc-inp').value = v;
    await calcNatal();
  } catch(e) {
    alert('Erro ao salvar: ' + e.message);
  }
}

async function limparKinNatal() {
  if (!currentUserUID) return;
  await db.collection('users').doc(currentUserUID).update({
    kinNatalData: firebase.firestore.FieldValue.delete(),
    kinNatalNum: firebase.firestore.FieldValue.delete()
  });
  document.getElementById('perfil-kin-salvo').innerHTML =
    '<p class="perfil-sem-kin">Nenhum Kin Natal salvo ainda.</p>';
  document.getElementById('perfil-nasc-inp').value = '';
}

// ══════════════════════════════════════════════════
// NOTIFICAÇÕES PUSH (PWA)
// ══════════════════════════════════════════════════
function atualizarBotaoNotif() {
  const btn = document.getElementById('btn-notif');
  if (!btn) return;
  if (!('Notification' in window) || !('serviceWorker' in navigator)) {
    btn.textContent = 'Não disponível';
    btn.disabled = true;
    btn.classList.add('ativo');
    return;
  }
  if (Notification.permission === 'granted') {
    btn.textContent = '✓ Ativado';
    btn.classList.add('ativo');
  } else if (Notification.permission === 'denied') {
    btn.textContent = 'Bloqueado';
    btn.disabled = true;
    btn.classList.add('ativo');
  } else {
    btn.textContent = 'Ativar';
    btn.classList.remove('ativo');
  }
}

async function toggleNotificacao() {
  if (!('Notification' in window)) {
    alert('Seu navegador não suporta notificações.');
    return;
  }
  if (Notification.permission === 'granted') {
    alert('Notificações já estão ativas! Para desativar, acesse as configurações do seu navegador.');
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    await agendarNotificacaoDiaria();
    atualizarBotaoNotif();
    // Mostrar notificação de teste
    new Notification('🌀 Sincronário das 13 Luas', {
      body: 'Notificações ativadas! Você receberá o Kin do dia toda manhã.',
      icon: './icon-192.png',
      badge: './icon-192.png'
    });
  }
  atualizarBotaoNotif();
}

async function agendarNotificacaoDiaria() {
  // Verifica suporte a Background Sync / periodic sync
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    // Periodic Background Sync (Chrome Android)
    if ('periodicSync' in reg) {
      const status = await navigator.permissions.query({ name: 'periodic-background-sync' });
      if (status.state === 'granted') {
        await reg.periodicSync.register('kin-diario', { minInterval: 24 * 60 * 60 * 1000 });
      }
    }
  } catch(e) {
    console.log('Periodic sync não disponível:', e);
  }
}

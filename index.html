<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sincronário das 13 Luas - Completo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--bg:#0a0c14;--bg2:#11142a;--card:#161b30;--border:rgba(180,154,240,0.18);--gold:#c9a84c;--text:#ece9f5;--text2:#9892b0;--text3:#6a647a;--radius:12px;--red:#d63b3b;--blue:#3b8ed6;--yellow:#f5c842}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;font-size:17px;line-height:1.6;min-height:100vh}
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-box{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:3rem 2rem;max-width:400px;width:100%;text-align:center}
.login-box h1{font-family:'Cinzel',serif;font-size:1.8rem;color:var(--gold);margin-bottom:1rem}
.login-box p{color:var(--text2);margin-bottom:2rem}
.btn-google{background:#fff;color:#333;border:none;border-radius:8px;padding:12px 24px;font-family:'Cinzel',serif;font-size:0.9rem;cursor:pointer;display:inline-flex;align-items:center;gap:10px;transition:all 0.2s}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(255,255,255,0.2)}
.error-msg{background:rgba(214,59,59,0.1);border:0.5px solid var(--red);color:var(--red);padding:1rem;border-radius:8px;margin-top:1rem;font-size:0.9rem}
.loading{color:var(--text2);margin-top:1rem}
.container{max-width:1000px;margin:0 auto;padding:2rem 1.5rem;display:none}
.container.active{display:block}
h1{font-family:'Cinzel',serif;font-size:2rem;color:var(--gold);text-align:center;margin-bottom:0.5rem}
.user-bar{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.user-info{display:flex;align-items:center;gap:12px}
.user-avatar{width:40px;height:40px;border-radius:50%;border:2px solid var(--gold)}
.btn-logout,.btn-admin,.btn-export{background:rgba(180,154,240,0.1);border:0.5px solid var(--border);border-radius:8px;color:var(--text2);padding:8px 16px;font-family:'Cinzel',serif;font-size:0.75rem;cursor:pointer;text-transform:uppercase}
.btn-admin{border-color:var(--gold);color:var(--gold)}
.btn-export{border-color:var(--blue);color:var(--blue)}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border);flex-wrap:wrap}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:'Cinzel',serif;font-size:0.75rem;padding:12px 20px;cursor:pointer;text-transform:uppercase}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-content{display:none}
.tab-content.active{display:block}
.section{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.kin-hero{text-align:center;padding:2rem;background:linear-gradient(135deg,var(--bg2),var(--bg));border-radius:var(--radius);margin-bottom:1.5rem;border:0.5px solid var(--border)}
.kin-emoji{font-size:4rem;margin-bottom:1rem}
.kin-title{font-family:'Cinzel',serif;font-size:1.8rem;margin:1rem 0;letter-spacing:0.05em;color:var(--gold)}
.kin-subtitle{color:var(--text2);font-size:0.9rem}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:1.5rem 0}
.card{background:var(--bg2);border-radius:8px;padding:1rem;border:0.5px solid var(--border)}
.card-label{font-size:0.75rem;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.card-val{font-family:'Cinzel',serif;font-size:0.95rem;color:var(--text)}
.hidden{display:none}
input[type="date"]{background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font-family:inherit;color-scheme:dark;width:100%;max-width:200px}
.btn-calc{background:linear-gradient(135deg,rgba(138,110,220,0.2),rgba(201,168,76,0.15));border:0.5px solid var(--gold);border-radius:8px;color:var(--gold);font-family:'Cinzel',serif;font-size:0.75rem;padding:10px 22px;cursor:pointer;text-transform:uppercase}
.input-group{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
</style>
</head>
<body>

<div id="login-screen" class="login-container">
<div class="login-box">
<h1>🌀 Sincronário das 13 Luas</h1>
<p>Faça login com sua conta Google</p>
<button class="btn-google" id="btn-login">
<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/><path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/><path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24c0 3.55.85 6.91 2.34 9.88l7.35-5.7z"/><path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/></svg>
Entrar com Google
</button>
<div id="login-error" class="error-msg hidden"></div>
<div id="login-loading" class="loading hidden">Entrando...</div>
</div>
</div>

<div id="app-screen" class="container">
<div class="user-bar">
<div class="user-info">
<img id="user-avatar" class="user-avatar" src="" alt="">
<div>
<div id="user-name" style="font-family:Cinzel;color:var(--text)"></div>
<div id="user-role" style="font-size:0.75rem;color:var(--gold);text-transform:uppercase"></div>
</div>
</div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<button id="btn-admin" class="btn-admin hidden" onclick="window.location.href='admin.html'">Painel Admin</button>
<button class="btn-export" onclick="exportPNG()">📸 Exportar PNG</button>
<button class="btn-logout" id="btn-logout">Sair</button>
</div>
</div>

<h1>🌀 Sincronário das 13 Luas</h1>
<p style="text-align:center;color:var(--text2);margin-bottom:2rem;font-style:italic">Calculadora Completa · Lei do Tempo</p>

<div class="tabs">
<button class="tab active" onclick="switchTab('dia')">Kin do Dia</button>
<button class="tab" onclick="switchTab('natal')">Kin Natal</button>
</div>

<div id="export-area">
<div id="tab-dia" class="tab-content active">
<div class="section"><div id="res-dia"></div></div>
</div>

<div id="tab-natal" class="tab-content">
<div class="section">
<div style="font-family:Cinzel;font-size:0.75rem;color:var(--gold);text-transform:uppercase;margin-bottom:1rem">Kin Natal</div>
<div class="input-group">
<label style="color:var(--text2);font-style:italic">Data de Nascimento</label>
<input type="date" id="nasc-inp">
<button class="btn-calc" onclick="calcNatal()">Calcular</button>
</div>
<div id="res-natal" class="hidden" style="margin-top:1.5rem"></div>
</div>
</div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// Dados dos selos com cores
const SELOS_NOMES = [
  'Dragão Vermelho', 'Vento Branco', 'Noite Azul', 'Semente Amarela',
  'Serpente Vermelha', 'Enlaçador de Mundos Branco', 'Mão Azul', 'Estrela Amarela',
  'Lua Vermelha', 'Cão Branco', 'Macaco Azul', 'Humano Amarelo',
  'Caminhante do Céu Vermelho', 'Mago Branco', 'Águia Azul', 'Guerreiro Amarelo',
  'Terra Vermelha', 'Espelho Branco', 'Tormenta Azul', 'Sol Amarelo'
];

const TONS_NOMES = ['', 'Magnético', 'Lunar', 'Elétrico', 'Autoexistente', 'Harmônico', 'Rítmico', 'Ressonante', 'Galáctico', 'Solar', 'Planetário', 'Espectral', 'Cristal', 'Cósmico'];

const EMOJIS = ['🐉', '💨', '🌌', '🌱', '🐍', '☯️', '✋', '⭐', '🌙', '🐕', '🐒', '👤', '🚶', '🧙', '🦅', '⚔️', '🌍', '🪞', '⛈️', '☀️'];

// Seletos femininos para concordância
const FEMININOS = new Set(['Noite', 'Serpente', 'Mão', 'Estrela', 'Lua', 'Águia', 'Terra', 'Semente', 'Tormenta']);

function concordarGenero(selo, tom) {
  // Verificar se é feminino
  let eh_fem = false;
  for (let pal of FEMININOS) {
    if (selo.includes(pal)) {
      eh_fem = true;
      break;
    }
  }
  
  if (!eh_fem) return tom;
  
  // Converter para feminino
  return tom
    .replace('Magnético', 'Magnética')
    .replace('Elétrico', 'Elétrica')
    .replace('Rítmico', 'Rítmica')
    .replace('Galáctico', 'Galáctica')
    .replace('Planetário', 'Planetária')
    .replace('Cósmico', 'Cósmica');
}

const firebaseConfig = {
  apiKey: "AIzaSyDOf77LceD2eKXlewRxxJT60hiBIlRJrJY",
  authDomain: "sincro13luas.firebaseapp.com",
  projectId: "sincro13luas",
  storageBucket: "sincro13luas.firebasestorage.app",
  messagingSenderId: "886057704979",
  appId: "1:886057704979:web:31b8348110ff8649c369e6"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
  .then(() => console.log('✅ Persistência LOCAL ativada'))
  .catch((err) => console.error('❌ Erro persistência:', err));

document.getElementById('btn-login').onclick = () => {
  console.log('🔵 Iniciando login...');
  document.getElementById('login-loading').classList.remove('hidden');
  document.getElementById('login-error').classList.add('hidden');
  
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.addScope('profile');
  provider.addScope('email');
  
  auth.signInWithPopup(provider)
    .then((result) => {
      console.log('✅ Login bem-sucedido!');
      console.log('📧 Email:', result.user.email);
    })
    .catch((error) => {
      console.error('❌ Erro no popup:', error.code);
      if (error.code === 'auth/popup-blocked') {
        document.getElementById('login-error').textContent = '⚠️ Popup bloqueado! Desbloqueia no navegador.';
      } else if (error.code === 'auth/popup-closed-by-user') {
        document.getElementById('login-error').textContent = 'Login cancelado.';
      } else {
        document.getElementById('login-error').textContent = '❌ Erro: ' + error.message;
      }
      document.getElementById('login-error').classList.remove('hidden');
      document.getElementById('login-loading').classList.add('hidden');
    });
};

auth.getRedirectResult().catch(err => console.error('❌ Erro redirect:', err));

let authChecked = false;
const authTimeout = setTimeout(() => {
  if (!authChecked) {
    console.warn('⏱️ Timeout');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').classList.remove('active');
  }
}, 5000);

auth.onAuthStateChanged(async (user) => {
  authChecked = true;
  clearTimeout(authTimeout);
  
  if (user) {
    console.log('✅ Usuário logado:', user.email);
    
    try {
      const userRef = db.collection('users').doc(user.uid);
      const userDoc = await userRef.get();
      
      if (userDoc.exists) {
        const data = userDoc.data();
        
        if (data.authorized === true) {
          console.log('✅ ACESSO LIBERADO!');
          
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('app-screen').classList.add('active');
          
          document.getElementById('user-avatar').src = user.photoURL || '';
          document.getElementById('user-name').textContent = user.displayName;
          document.getElementById('user-role').textContent = data.role || 'usuário';
          
          if (data.role === 'admin') {
            document.getElementById('btn-admin').classList.remove('hidden');
          }
          
          loadToday();
        } else {
          console.log('⏳ Pendente de autorização');
          document.getElementById('login-error').textContent = '⏳ Sua conta foi criada! Aguarde o admin autorizar seu acesso.';
          document.getElementById('login-error').style.background = 'rgba(245,200,66,0.1)';
          document.getElementById('login-error').style.borderColor = '#f5c842';
          document.getElementById('login-error').style.color = '#f5c842';
          document.getElementById('login-error').classList.remove('hidden');
          setTimeout(() => auth.signOut(), 4000);
        }
      } else {
        console.log('📝 Criando novo documento');
        await userRef.set({
          authorized: false,
          displayName: user.displayName || 'Usuário',
          email: user.email,
          photoURL: user.photoURL || '',
          role: 'usuário',
          createdAt: new Date()
        });
        
        console.log('✅ Documento criado!');
        
        document.getElementById('login-error').textContent = '⏳ Sua conta foi criada! Aguarde o admin autorizar seu acesso.';
        document.getElementById('login-error').style.background = 'rgba(245,200,66,0.1)';
        document.getElementById('login-error').style.borderColor = '#f5c842';
        document.getElementById('login-error').style.color = '#f5c842';
        document.getElementById('login-error').classList.remove('hidden');
        setTimeout(() => auth.signOut(), 4000);
      }
    } catch (error) {
      console.error('❌ Erro:', error);
      document.getElementById('login-error').textContent = '❌ Erro: ' + error.message;
      document.getElementById('login-error').classList.remove('hidden');
    }
    
    document.getElementById('login-loading').classList.add('hidden');
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').classList.remove('active');
    document.getElementById('login-loading').classList.add('hidden');
    document.getElementById('login-error').classList.add('hidden');
  }
});

document.getElementById('btn-logout').onclick = () => auth.signOut();

async function exportPNG() {
  const area = document.getElementById('export-area');
  const canvas = await html2canvas(area, {backgroundColor: '#0a0c14', scale: 2});
  const link = document.createElement('a');
  link.download = `sincronario-${new Date().toISOString().split('T')[0]}.png`;
  link.href = canvas.toDataURL();
  link.click();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

function isLeapDay(d) {
  return d.getMonth() === 1 && d.getDate() === 29;
}

function daysBetween(f, t) {
  if (f > t) return -daysBetween(t, f);
  let c = 0;
  const d = new Date(f.getTime());
  while (d < t) {
    d.setDate(d.getDate() + 1);
    if (!isLeapDay(d)) c++;
  }
  return c;
}

function dateToKin(dt) {
  if (isLeapDay(dt)) return dateToKin(new Date(dt.getFullYear(), 1, 28));
  const b = new Date(1987, 6, 26);
  const d = daysBetween(b, dt);
  return ((34 - 1 + d) % 260 + 260) % 260 + 1;
}

function kinHTML(kin_num) {
  const selos_idx = (kin_num - 1) % 20;
  const tom_idx = Math.floor((kin_num - 1) / 20) + 1;
  
  const selo = SELOS_NOMES[selos_idx];
  const tom = TONS_NOMES[tom_idx];
  const emoji = EMOJIS[selos_idx];
  const tom_concordado = concordarGenero(selo, tom);
  
  return `
    <div class="kin-hero">
      <div class="kin-emoji">${emoji}</div>
      <div class="kin-title">${selo} ${tom_concordado}</div>
      <div class="kin-subtitle">Kin ${kin_num} de 260</div>
    </div>
    <div class="cards">
      <div class="card">
        <div class="card-label">🌟 Selo Solar</div>
        <div class="card-val">${selo}</div>
      </div>
      <div class="card">
        <div class="card-label">🎯 Tom Galáctico</div>
        <div class="card-val">${tom_concordado}</div>
      </div>
    </div>
  `;
}

function calcNatal() {
  const v = document.getElementById('nasc-inp').value;
  if (!v) return;
  const [y, m, d] = v.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const k = dateToKin(dt);
  document.getElementById('res-natal').innerHTML = kinHTML(k);
  document.getElementById('res-natal').classList.remove('hidden');
}

function loadToday() {
  const k = dateToKin(new Date());
  document.getElementById('res-dia').innerHTML = kinHTML(k);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sincronário das 13 Luas</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#009739">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="13 Luas">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   DESIGN SYSTEM — SINCRONÁRIO 13 LUAS
   Fundo: Verde escuro · Detalhes: Dourado + Marrom
═══════════════════════════════════ */
:root {
  --bg:     #071209;
  --bg2:    #0a1a0c;
  --card:   #0d1f0f;
  --card2:  #112613;
  --green:  #009739;
  --green2: #00b544;
  --green3: #006828;
  --green4: #004d1e;
  --gold:   #A57C00;
  --gold2:  #c9a030;
  --gold3:  #e8c060;
  --brown:  #3C2F2F;
  --brown2: #5a4535;
  --border:  rgba(0,151,57,0.20);
  --border2: rgba(0,151,57,0.40);
  --border-g:rgba(165,124,0,0.28);
  --text:  #c0dcc4;
  --text2: #5a8860;
  --text3: #2e5034;
  --red:   #8a2018;
  --white: #a8b890;
  --blue:  #1a4860;
  --radius:8px;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;font-size:16px;line-height:1.65;min-height:100vh}

/* ── ANIMAÇÕES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}

.anim-1{animation:fadeUp .28s .00s both}
.anim-2{animation:fadeUp .28s .08s both}
.anim-3{animation:fadeUp .28s .16s both}
.anim-4{animation:fadeUp .28s .24s both}
.anim-5{animation:fadeUp .28s .32s both}

/* ── SKELETON LOADING ── */
.skel{
  background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);
  background-size:400px 100%;
  animation:shimmer 1.4s infinite;
  border-radius:6px;
}
.skel-title{height:28px;width:65%;margin:0 auto 12px}
.skel-sub  {height:14px;width:40%;margin:0 auto 20px}
.skel-frase{height:60px;width:100%;margin-top:16px}
.skel-card {height:72px;width:100%}
.skel-row  {height:16px;width:100%;margin-bottom:8px}
.skel-row.w70{width:70%}

/* ── LOGIN ── */
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.login-box{
  background:var(--card);border:1px solid var(--border2);border-radius:12px;
  padding:2.8rem 2.4rem;max-width:360px;width:100%;text-align:center;
  animation:fadeUp .4s both;
}
.login-box h1{font-family:'Cinzel',serif;font-size:1.35rem;color:var(--green2);margin-bottom:0.3rem;letter-spacing:0.06em}
.login-divider{width:24px;height:1px;background:var(--gold);margin:.9rem auto;opacity:.5}
.login-box p{color:var(--text3);margin-bottom:1.7rem;font-size:.83rem}
.btn-google{
  background:var(--card2);color:var(--text2);border:1px solid var(--border);
  border-radius:6px;padding:10px 20px;font-family:'Cinzel',serif;font-size:.76rem;
  cursor:pointer;display:inline-flex;align-items:center;gap:10px;
  transition:border-color .2s,color .2s;letter-spacing:.04em;
}
.btn-google:hover{border-color:var(--green2);color:var(--text)}
.error-msg{background:rgba(138,32,24,.12);border:1px solid rgba(138,32,24,.3);color:#b06858;padding:.7rem .9rem;border-radius:6px;margin-top:1rem;font-size:.82rem}
.loading{color:var(--text3);margin-top:1rem;font-style:italic;font-size:.84rem}

/* ── LAYOUT ── */
.container{max-width:960px;margin:0 auto;padding:1rem;display:none}
.container.active{display:block}
h1{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--green2);text-align:center;margin-bottom:.2rem;letter-spacing:.06em}

/* ── USER BAR ── */
.user-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem 1rem;margin-bottom:.9rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:7px}
.user-avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--green3)}

/* ── BOTÕES ── */
.btn-logout,.btn-admin,.btn-export{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text3);padding:5px 11px;font-family:'Cinzel',serif;font-size:.6rem;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;transition:all .2s}
.btn-logout:hover,.btn-export:hover{border-color:var(--green3);color:var(--text2)}
.btn-admin{border-color:var(--border-g);color:var(--gold)}
.btn-admin:hover{background:rgba(165,124,0,.12);border-color:var(--gold2)}

/* ── TABS ── */
.tabs{display:flex;margin-bottom:.9rem;border-bottom:1px solid var(--border)}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:'Cinzel',serif;font-size:.62rem;padding:8px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:.09em;transition:color .2s,border-color .2s;margin-bottom:-1px}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--green2);border-bottom-color:var(--green)}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── SECTIONS ── */
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:.6rem}
.section-title{font-family:'Cinzel',serif;font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.13em;margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── KIN HERO ── */
.kin-hero{
  text-align:center;padding:2rem 1.3rem 1.6rem;background:var(--card2);
  border-radius:var(--radius);margin-bottom:.6rem;border:1px solid var(--border2);
  position:relative;overflow:hidden;
}
.kin-hero::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--green3),var(--green2),var(--green3),transparent);
}
.kin-hero::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.45;
}
.kin-num{font-family:'Cinzel',serif;font-size:.58rem;color:var(--text3);letter-spacing:.16em;text-transform:uppercase;margin-bottom:.7rem}
.kin-title{font-family:'Cinzel',serif;font-size:1.6rem;margin:.25rem 0 .45rem;letter-spacing:.03em;color:var(--green2);line-height:1.2}
.kin-subtitle{color:var(--text3);font-size:.68rem;text-transform:uppercase;letter-spacing:.1em}
.kin-frase{
  color:var(--text2);font-size:.9rem;font-style:italic;
  margin:1.1rem auto 0;padding:.85rem 1.1rem;
  background:rgba(0,151,57,.08);border-left:2px solid var(--green3);
  max-width:640px;line-height:1.9;
}

/* ── CARDS ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:6px;margin:.8rem 0}
.card{background:var(--bg2);border-radius:6px;padding:.85rem .95rem;border:1px solid var(--border);transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-label{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.11em;margin-bottom:4px}
.card-val{font-family:'Cinzel',serif;font-size:.84rem;color:var(--text)}

/* ── SELOS ── */
.selo-icon{border-radius:6px;display:flex;align-items:center;justify-content:center;border:1px solid;margin:0 auto .5rem;overflow:hidden}
.selo-red  {background:rgba(138,32,24,.13);border-color:rgba(138,32,24,.35)}
.selo-white{background:rgba(168,184,144,.07);border-color:rgba(168,184,144,.2)}
.selo-blue {background:rgba(26,72,96,.13);border-color:rgba(26,72,96,.35)}
.selo-yellow{background:rgba(165,124,0,.11);border-color:rgba(165,124,0,.3)}

/* ── ORÁCULO — SVG COM LINHAS DE CONEXÃO ── */
.oraculo-svg-wrap{
  position:relative;width:100%;max-width:340px;margin:.7rem auto;
  aspect-ratio:1/1;
}
.oraculo-svg-lines{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
}
.oraculo-svg-lines line{
  stroke:var(--green3);stroke-width:1;opacity:.35;
  stroke-dasharray:3 4;
}
.oraculo-svg-lines line.strong{opacity:.55;stroke-dasharray:none}
.oraculo-svg-lines circle.center-glow{
  fill:none;stroke:var(--gold);stroke-width:1;opacity:.25;
  animation:oraculoPulse 4s ease-in-out infinite;
}
@keyframes oraculoPulse{
  0%,100%{opacity:.15;r:50}
  50%    {opacity:.4; r:58}
}
.oraculo-svg-wrap .oraculo-grid{
  position:absolute;inset:0;width:100%;height:100%;
  z-index:1;margin:0;max-width:none;
  display:grid;grid-template-columns:1fr auto 1fr;grid-template-rows:1fr auto 1fr;
}
.oraculo-cell-top   {grid-column:2;grid-row:1;align-self:start}
.oraculo-cell-left  {grid-column:1;grid-row:2;justify-self:start}
.oraculo-cell-center{grid-column:2;grid-row:2}
.oraculo-cell-right {grid-column:3;grid-row:2;justify-self:end}
.oraculo-cell-bottom{grid-column:2;grid-row:3;align-self:end}
.oraculo-item{text-align:center}
.oraculo-central .selo-icon{width:78px;height:78px;border-radius:8px}
.oraculo-side    .selo-icon{width:56px;height:56px;border-radius:6px}
.oraculo-nome{font-size:.54rem;margin-top:.28rem;color:var(--text3);font-family:'Cinzel',serif;letter-spacing:.04em;line-height:1.3}

/* ── ONDA ENCANTADA — GRID COM --cell ESCALÁVEL ── */
.onda-wrap{display:flex;justify-content:center;margin:.7rem 0}
.onda-L{
  display:grid;
  grid-template-columns:repeat(4,var(--cell));
  grid-template-rows:repeat(4,var(--cell));
  --cell:56px;gap:4px;
}
.onda-L .onda-kin:nth-child(1) {grid-column:1;grid-row:1}
.onda-L .onda-kin:nth-child(2) {grid-column:2;grid-row:1}
.onda-L .onda-kin:nth-child(3) {grid-column:3;grid-row:1}
.onda-L .onda-kin:nth-child(4) {grid-column:4;grid-row:1}
.onda-L .onda-kin:nth-child(5) {grid-column:1;grid-row:2}
.onda-L .onda-kin:nth-child(6) {grid-column:1;grid-row:3}
.onda-L .onda-kin:nth-child(7) {grid-column:1;grid-row:4}
.onda-L .onda-kin:nth-child(8) {grid-column:2;grid-row:4}
.onda-L .onda-kin:nth-child(9) {grid-column:3;grid-row:4}
.onda-L .onda-kin:nth-child(10){grid-column:4;grid-row:2}
.onda-L .onda-kin:nth-child(11){grid-column:4;grid-row:3}
.onda-L .onda-kin:nth-child(12){grid-column:4;grid-row:4}
.onda-L .onda-kin:nth-child(13){grid-column:2/4;grid-row:2/4;width:auto;height:auto}
.onda-kin{width:var(--cell);height:var(--cell);border-radius:5px;display:flex;align-items:center;justify-content:center;border:1px solid;cursor:pointer;overflow:hidden;transition:transform .14s,box-shadow .14s}
.onda-kin:hover{transform:scale(1.09)}
.onda-kin.active{box-shadow:0 0 0 2px var(--green);border-color:var(--green)!important}
.cor-red  {background:rgba(138,32,24,.13);border-color:rgba(138,32,24,.35)}
.cor-white{background:rgba(168,184,144,.05);border-color:rgba(168,184,144,.18)}
.cor-blue {background:rgba(26,72,96,.13);border-color:rgba(26,72,96,.35)}
.cor-yellow{background:rgba(165,124,0,.11);border-color:rgba(165,124,0,.3)}

/* ── PRÁTICAS ── */
.praticas-list{list-style:none;padding:0}
.praticas-list li{padding:.6rem .85rem;margin-bottom:4px;background:var(--bg2);border-radius:5px;border-left:2px solid var(--green3);display:flex;align-items:flex-start;gap:8px;font-size:.86rem;line-height:1.5;transition:border-color .2s}
.praticas-list li:hover{border-left-color:var(--gold)}
.praticas-list li::before{content:'·';color:var(--green2);font-size:1.1rem;flex-shrink:0;line-height:1.3}

/* ── MISC ── */
.hidden{display:none}
input[type="date"]{background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-family:inherit;color-scheme:dark;font-size:.87rem;transition:border-color .2s}
input[type="date"]:focus{outline:none;border-color:var(--green)}
.btn-calc{background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--green2);font-family:'Cinzel',serif;font-size:.63rem;padding:7px 15px;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;transition:all .2s}
.btn-calc:hover{background:var(--green);color:#fff;border-color:var(--green)}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:.6rem}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.55rem}
.tooltip{position:relative;cursor:help}
.tooltip:hover::after{content:attr(data-tooltip);position:absolute;bottom:calc(100%+5px);left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text2);padding:.3rem .7rem;border-radius:4px;border:1px solid var(--border);white-space:nowrap;z-index:1000;font-size:.63rem}
.info-text{color:var(--text2);font-size:.82rem;line-height:1.65;margin:.28rem 0}
.info-box{background:var(--bg2);padding:.75rem .85rem;border-radius:5px;border-left:2px solid var(--green3);margin:.55rem 0}

/* ── LUA GALÁCTICA — CIRCULAR EM SVG ── */
.lua-circular{
  width:100%;max-width:260px;margin:0 auto;display:block;
}
.lua-circular .seg{
  fill:var(--bg2);stroke:rgba(0,151,57,0.18);stroke-width:1;
  transition:fill .2s,stroke .2s;cursor:default;
}
.lua-circular .seg.red   {stroke:rgba(138,32,24,.38)}
.lua-circular .seg.white {stroke:rgba(168,184,144,.2)}
.lua-circular .seg.blue  {stroke:rgba(26,72,96,.38)}
.lua-circular .seg.yellow{stroke:rgba(165,124,0,.32)}
.lua-circular .seg.active{fill:var(--gold);stroke:var(--gold2)}
.lua-circular .seg-label{
  font-family:'Cinzel',serif;font-size:6px;fill:var(--text3);
  pointer-events:none;text-anchor:middle;dominant-baseline:central;
}
.lua-circular .seg.active + .seg-label,
.lua-circular .seg-label.active{fill:#1a1000;font-weight:600}
.lua-circular .ring-label{
  font-family:'Cinzel',serif;font-size:5px;fill:var(--text3);
  text-transform:uppercase;letter-spacing:.15em;text-anchor:middle;
}
.lua-circular .center-text{
  font-family:'Cinzel',serif;fill:var(--green2);text-anchor:middle;
}
.lua-circular .center-num{font-size:18px;dominant-baseline:central}
.lua-circular .center-sub{font-size:5px;fill:var(--text3);letter-spacing:.1em;text-transform:uppercase;dominant-baseline:central}

/* ── MEDIA QUERIES ── */
@media (max-width:600px){
  body{font-size:15px}
  .container{padding:.75rem .65rem}
  h1{font-size:1.2rem}
  .user-bar{padding:.6rem .7rem;flex-direction:column;align-items:flex-start}
  .user-bar>div:last-child{width:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
  .btn-logout,.btn-admin,.btn-export{width:100%;text-align:center;font-size:.56rem;padding:5px 6px}
  .section{padding:.85rem}
  .kin-hero{padding:1.2rem .9rem 1rem}
  .kin-title{font-size:1.2rem}
  .kin-frase{font-size:.83rem;padding:.75rem .85rem}
  .oraculo-grid{gap:6px;max-width:288px}
  .oraculo-central .selo-icon{width:60px;height:60px}
  .oraculo-side .selo-icon{width:46px;height:46px}
  .oraculo-nome{font-size:.5rem}
  .onda-L{--cell:46px;gap:3px}
  .cards{grid-template-columns:1fr 1fr;gap:5px}
  .grid-2,.grid-3{grid-template-columns:1fr;gap:.55rem}
  input[type="date"]{width:100%}
  .btn-calc{width:100%;margin-top:5px}
  .tab{padding:7px 10px;font-size:.58rem}
  .lua-circular{max-width:220px}
}
@media (max-width:400px){
  .container{padding:.65rem .5rem}
  h1{font-size:1rem}
  .kin-title{font-size:1rem}
  .oraculo-grid{max-width:252px;gap:5px}
  .oraculo-central .selo-icon{width:52px;height:52px}
  .oraculo-side .selo-icon{width:40px;height:40px}
  .onda-L{--cell:38px;gap:3px}
  .lua-circular{max-width:190px}
  .cards{grid-template-columns:1fr}
}
@media (max-height:500px) and (orientation:landscape){
  .kin-hero{padding:.75rem .9rem}
  .kin-title{font-size:1.05rem}
  .kin-frase{font-size:.78rem;padding:.6rem}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

// CÁLCULOS DE DATA
function isLeapDay(d) {
  return d.getMonth() === 1 && d.getDate() === 29;
}

function daysBetween(f, t) {
  if (f > t) return -daysBetween(t, f);
  let c = 0;
  const d = new Date(f.getTime());
  while (d < t) {
    d.setDate(d.getDate() + 1);
    if (!isLeapDay(d)) c++;
  }
  return c;
}

function dateToKin(dt) {
  if (isLeapDay(dt)) return dateToKin(new Date(dt.getFullYear(), 1, 28));
  // Normaliza para meia-noite para evitar bug de comparação de timestamp
  // (sem normalização, new Date() com hora > 00:00 conta 1 dia a mais)
  const dtNorm = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
  const base = new Date(1987, 6, 26);
  const dias = daysBetween(base, dtNorm);
  return ((34 - 1 + dias) % 260 + 260) % 260 + 1;
}

function getFaseLunar(d) {
  const lc = 29.53;
  const nk = new Date(2000, 0, 6, 18, 14);
  const df = (d - nk) / (1000 * 60 * 60 * 24);
  const ph = (df % lc) / lc;
  if (ph < 0.03 || ph > 0.97) return '🌑 Nova';
  if (ph < 0.28) return '🌒 Crescente';
  if (ph < 0.53) return '🌕 Cheia';
  if (ph < 0.78) return '🌘 Minguante';
  return '🌑 Nova';
}

// 28 dias divididos em 4 semanas (Vermelha, Branca, Azul, Amarela)
// Renderiza um anel com 28 segmentos + ponto central
function gerarLuaCircular(diaAtivo) {
  const cores = ['red','white','blue','yellow'];
  const nomesAnel = ['VERMELHA','BRANCA','AZUL','AMARELA'];
  const cx = 100, cy = 100;
  const rOut = 92, rIn = 60;     // raios do anel de dias
  const rLabel = 76;              // raio do número do dia
  const rRing = 98;               // raio do label da semana
  let segs = '';
  let labels = '';
  let ringLabels = '';

  for (let i = 0; i < 28; i++) {
    const dia = i + 1;
    const semana = Math.floor(i / 7);
    const cor = cores[semana];
    // ângulo de cada segmento (12,857° = 360/28). Começa do topo (-90°)
    const a1 = (i * 360/28 - 90) * Math.PI/180;
    const a2 = ((i+1) * 360/28 - 90) * Math.PI/180;
    const x1o = cx + rOut * Math.cos(a1), y1o = cy + rOut * Math.sin(a1);
    const x2o = cx + rOut * Math.cos(a2), y2o = cy + rOut * Math.sin(a2);
    const x1i = cx + rIn  * Math.cos(a1), y1i = cy + rIn  * Math.sin(a1);
    const x2i = cx + rIn  * Math.cos(a2), y2i = cy + rIn  * Math.sin(a2);
    const path = `M ${x1o.toFixed(2)} ${y1o.toFixed(2)}
                  A ${rOut} ${rOut} 0 0 1 ${x2o.toFixed(2)} ${y2o.toFixed(2)}
                  L ${x2i.toFixed(2)} ${y2i.toFixed(2)}
                  A ${rIn} ${rIn} 0 0 0 ${x1i.toFixed(2)} ${y1i.toFixed(2)} Z`;
    const ativo = dia === diaAtivo ? ' active' : '';
    segs += `<path d="${path}" class="seg ${cor}${ativo}"></path>`;

    // Label do número do dia (centro do segmento)
    const aMid = ((i + 0.5) * 360/28 - 90) * Math.PI/180;
    const lx = cx + rLabel * Math.cos(aMid);
    const ly = cy + rLabel * Math.sin(aMid);
    labels += `<text x="${lx.toFixed(2)}" y="${ly.toFixed(2)}" class="seg-label${ativo}">${dia}</text>`;
  }

  // Labels das 4 semanas (fora do anel, nos 4 quadrantes diagonais)
  for (let s = 0; s < 4; s++) {
    const aMid = ((s * 7 + 3.5) * 360/28 - 90) * Math.PI/180;
    const lx = cx + rRing * Math.cos(aMid);
    const ly = cy + rRing * Math.sin(aMid);
    ringLabels += `<text x="${lx.toFixed(2)}" y="${ly.toFixed(2)}" class="ring-label">${nomesAnel[s]}</text>`;
  }

  return `
  <svg class="lua-circular" viewBox="-10 -10 220 220" xmlns="http://www.w3.org/2000/svg">
    ${segs}
    ${labels}
    ${ringLabels}
    <text x="${cx}" y="${cy - 4}" class="center-text center-num">${diaAtivo}</text>
    <text x="${cx}" y="${cy + 14}" class="center-text center-sub">de 28</text>
  </svg>`;
}

async function calcNatal() {
  await DATA_PRONTO;
  const v = document.getElementById('nasc-inp').value;
  if (!v) return;
  const [y, m, d] = v.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const k = dateToKin(dt);
  document.getElementById('res-natal').innerHTML = kinHTML(k);
  document.getElementById('res-natal').classList.remove('hidden');
}

async function loadToday() {
  await DATA_PRONTO;
  const k = dateToKin(new Date());
  document.getElementById('res-dia').innerHTML = kinHTML(k);
}

<script>
// DADOS E CONFIGURAÇÕES
let DATA = {};
fetch('./sincronario_dados.json')
  .then(r => r.json())
  .then(d => {
    DATA = d;
    console.log('✓ Dados carregados:', Object.keys(DATA.kins).length, 'kins');
  })
  .catch(e => console.warn('⚠️ Erro:', e));

const EMOJIS = ['🐉', '💨', '🌌', '🌱', '🐍', '☯️', '✋', '⭐', '🌙', '🐕', '🐒', '👤', '🚶', '🧙', '🦅', '⚔️', '🌍', '🪞', '⛈️', '☀️'];
const CORES_SELO = ['red', 'white', 'blue', 'yellow', 'red', 'white', 'blue', 'yellow', 'red', 'white', 'blue', 'yellow', 'red', 'white', 'blue', 'yellow', 'red', 'white', 'blue', 'yellow'];
const CORES_ONDA = ['red', 'red', 'red', 'red', 'white', 'white', 'white', 'white', 'blue', 'blue', 'blue', 'blue', 'yellow'];
const FEMININOS = new Set(['Noite', 'Serpente', 'Mão', 'Estrela', 'Lua', 'Águia', 'Terra', 'Semente', 'Tormenta']);

function getSeloEmoji(nome) {
  const nomes = ['Dragão', 'Vento', 'Noite', 'Semente', 'Serpente', 'Enlaçador', 'Mão', 'Estrela', 'Lua', 'Cão', 'Macaco', 'Humano', 'Caminhante', 'Mago', 'Águia', 'Guerreiro', 'Terra', 'Espelho', 'Tormenta', 'Sol'];
  const idx = nomes.findIndex(s => nome.includes(s));
  return idx >= 0 ? EMOJIS[idx] : '🌀';
}

function getSeloBase(nomeCompleto) {
  const partes = nomeCompleto.split(' ');
  return partes.slice(0, -1).join(' ');
}

function getSeloCor(nomeCompleto) {
  const partes = nomeCompleto.split(' ');
  return partes[partes.length - 1].toLowerCase();
}

function concordar(selo, tom) {
  for (let p of FEMININOS) {
    if (selo.includes(p)) {
      return tom
        .replace('Magnético', 'Magnética')
        .replace('Lunar', 'Lunar')
        .replace('Elétrico', 'Elétrica')
        .replace('Autoexistente', 'Autoexistente')
        .replace('Overtone', 'Overtone')
        .replace('Rítmico', 'Rítmica')
        .replace('Ressonante', 'Ressonante')
        .replace('Galáctico', 'Galáctica')
        .replace('Solar', 'Solar')
        .replace('Planetário', 'Planetária')
        .replace('Espectral', 'Espectral')
        .replace('Cristal', 'Cristal')
        .replace('Cósmico', 'Cósmica');
    }
  }
  return tom;
}

// FIREBASE
const fc = {
  apiKey: "AIzaSyDOf77LceD2eKXlewRxxJT60hiBIlRJrJY",
  authDomain: "sincro13luas.firebaseapp.com",
  projectId: "sincro13luas",
  storageBucket: "sincro13luas.firebasestorage.app",
  messagingSenderId: "886057704979",
  appId: "1:886057704979:web:31b8348110ff8649c369e6"
};

firebase.initializeApp(fc);
const auth = firebase.auth();
const db = firebase.firestore();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

document.getElementById('btn-login').onclick = () => {
  document.getElementById('login-loading').classList.remove('hidden');
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.addScope('profile');
  provider.addScope('email');
  auth.signInWithPopup(provider).catch(e => {
    document.getElementById('login-error').textContent = e.code === 'auth/popup-blocked' ? '⚠️ Popup bloqueado!' : '❌ ' + e.message;
    document.getElementById('login-error').classList.remove('hidden');
    document.getElementById('login-loading').classList.add('hidden');
  });
};

auth.onAuthStateChanged(async u => {
  if (u) {
    try {
      const uR = db.collection('users').doc(u.uid);
      const uD = await uR.get();
      if (uD.exists) {
        const d = uD.data();
        if (d.authorized === true) {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('app-screen').classList.add('active');
          document.getElementById('user-avatar').src = u.photoURL || '';
          document.getElementById('user-name').textContent = u.displayName;
          document.getElementById('user-role').textContent = d.role || 'usuário';
          if (d.role === 'admin') document.getElementById('btn-admin').classList.remove('hidden');
          loadToday();
        } else {
          document.getElementById('login-error').textContent = '⏳ Aguarde autorização.';
          document.getElementById('login-error').style.background = 'rgba(245,200,66,0.1)';
          document.getElementById('login-error').classList.remove('hidden');
          setTimeout(() => auth.signOut(), 4000);
        }
      } else {
        await uR.set({
          authorized: false,
          displayName: u.displayName || 'Usuário',
          email: u.email,
          photoURL: u.photoURL || '',
          role: 'usuário',
          createdAt: new Date()
        });
        document.getElementById('login-error').textContent = '⏳ Conta criada! Aguarde autorização.';
        document.getElementById('login-error').style.background = 'rgba(245,200,66,0.1)';
        document.getElementById('login-error').classList.remove('hidden');
        setTimeout(() => auth.signOut(), 4000);
      }
    } catch (e) {
      document.getElementById('login-error').textContent = '❌ ' + e.message;
      document.getElementById('login-error').classList.remove('hidden');
    }
    document.getElementById('login-loading').classList.add('hidden');
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').classList.remove('active');
  }
});

document.getElementById('btn-logout').onclick = () => auth.signOut();

async function exportPNG() {
  const area = document.getElementById('export-area');
  const canvas = await html2canvas(area, { backgroundColor: '#0a0c14', scale: 2 });
  const link = document.createElement('a');
  link.download = `sincronario-${new Date().toISOString().split('T')[0]}.png`;
  link.href = canvas.toDataURL();
  link.click();
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`tab-${t}`).classList.add('active');
}

// CÁLCULOS DE DATA
function isLeapDay(d) {
  return d.getMonth() === 1 && d.getDate() === 29;
}

function daysBetween(f, t) {
  if (f > t) return -daysBetween(t, f);
  let c = 0;
  const d = new Date(f.getTime());
  while (d < t) {
    d.setDate(d.getDate() + 1);
    if (!isLeapDay(d)) c++;
  }
  return c;
}

function dateToKin(dt) {
  if (isLeapDay(dt)) return dateToKin(new Date(dt.getFullYear(), 1, 28));
  const base = new Date(1987, 6, 26);
  const dias = daysBetween(base, dt);
  return ((34 - 1 + dias) % 260 + 260) % 260 + 1;
}

function getFaseLunar(d) {
  const lc = 29.53;
  const nk = new Date(2000, 0, 6, 18, 14);
  const df = (d - nk) / (1000 * 60 * 60 * 24);
  const ph = (df % lc) / lc;
  if (ph < 0.03 || ph > 0.97) return '🌑 Nova';
  if (ph < 0.28) return '🌒 Crescente';
  if (ph < 0.53) return '🌕 Cheia';
  if (ph < 0.78) return '🌘 Minguante';
  return '🌑 Nova';
}

// PARTE 3 CONTINUA NA PRÓXIMA MENSAGEM (função kinHTML)


// FUNÇÃO PRINCIPAL - GERA TODO O HTML DO KIN
function kinHTML(kinNum) {
  const kD = DATA.kins[kinNum];
  if (!kD) return '<p>Carregando dados...</p>';

  const seloCompleto = kD.selo;
  const partes = seloCompleto.split(' ');
  const cor = partes[partes.length - 1];
  const seloBase = partes.slice(0, -1).join(' ');
  const tomOriginal = kD.tom_nome;
  const tomConcordado = concordar(seloCompleto, tomOriginal);
  const nomeCompleto = `${seloBase} ${tomConcordado} ${cor}`;
  const emoji = getSeloEmoji(seloCompleto);
  const fraseCurta = kD.frase_curta || '';
  const corSelo = getSeloCor(seloCompleto);

  const { guia, analogo, antipoda, oculto } = kD.oraculo;
  const tomNum = kD.tom;
  const tomInfo = DATA.tons[tomNum] || {};

  // Onda Encantada com CORES INDIVIDUAIS
  const ondaInicio = Math.floor((kinNum - 1) / 13) * 13 + 1;
  const diaOnda = ((kinNum - 1) % 13) + 1;
  let ondaHTML = '<div class="onda-L">';
  for (let i = 0; i < 13; i++) {
    const k = ondaInicio + i;
    const kData = DATA.kins[k];
    const em = kData ? getSeloEmoji(kData.selo) : '?';
    const corKin = kData ? getSeloCor(kData.selo) : 'white';
    const ativo = k === kinNum ? 'active' : '';
    const tooltip = kData ? `Kin ${k} - ${kData.selo} ${kData.tom_nome}` : '';
    ondaHTML += `<div class="onda-kin selo-${corKin} ${ativo}" title="${tooltip}">${em}</div>`;
  }
  ondaHTML += '</div>';

  // Castelo COMPLETO
  const casteloNum = Math.floor((kinNum - 1) / 52);
  const castelo = DATA.castelos[casteloNum] || {};
  const casteloTexto = `🏰 Castelo ${castelo.nome} ${castelo.dir} do ${castelo.proposito}`;
  const casteloOndas = castelo.ondas || [];
  let casteloOndasHTML = '<div style="display:flex;gap:8px;justify-content:center;margin-top:0.5rem">';
  for (let ondaNome of casteloOndas) {
    const ondaEmoji = getSeloEmoji(ondaNome);
    casteloOndasHTML += `<div class="tooltip" data-tooltip="${ondaNome}" style="font-size:2rem">${ondaEmoji}</div>`;
  }
  casteloOndasHTML += '</div>';

  // Plasma
  const diaSemana = (kinNum - 1) % 7;
  const plasma = DATA.plasmas[diaSemana] || '';

  // Ritual
  const ritual = DATA.rituais[diaOnda] || {};

  // Lua Galáctica com SEMANAS COLORIDAS
  const hoje = new Date();
  const anoGal = hoje >= new Date(hoje.getFullYear(), 6, 26) ? hoje.getFullYear() : hoje.getFullYear() - 1;
  const inicioAno = new Date(anoGal, 6, 26);
  const diasPassados = daysBetween(inicioAno, hoje);
  const luaNum = Math.floor(diasPassados / 28) + 1;
  const diaLua = (diasPassados % 28) + 1;
  const luaNome = DATA.luas[luaNum - 1] || '';
  
  let luaHTML = '<div style="display:flex;gap:6px;margin-top:1rem">';
  const coresSemana = ['red', 'white', 'blue', 'yellow'];
  for (let sem = 0; sem < 4; sem++) {
    luaHTML += '<div style="display:flex;flex-direction:column;gap:4px">';
    for (let d = 1; d <= 7; d++) {
      const diaNum = sem * 7 + d;
      const ativo = diaNum === diaLua ? 'active' : '';
      luaHTML += `<div class="lua-dia lua-${coresSemana[sem]} ${ativo}">${diaNum}</div>`;
    }
    luaHTML += '</div>';
  }
  luaHTML += '</div>';

  // Fase Lunar
  const faseLunar = getFaseLunar(hoje);

  // Anel Solar com ÍCONE
  const anelKin = ((kinNum - 1) % 20) + 1;
  const anelSelo = DATA.selos[anelKin] || {};
  const anelEmoji = getSeloEmoji(anelSelo.nome || '');
  const anelNome = anelSelo.nome || '';
  const anelAcao = anelSelo.acao || '';

  // Onda propósito
  const ondaNum = Math.floor((kinNum - 1) / 13) + 1;
  const ondaSelo = DATA.selos[((ondaNum - 1) % 20) + 1] || {};

  return `
<div class="section">
  <div class="kin-hero">
    <div class="selo-icon selo-${corSelo}">${emoji}</div>
    <div class="kin-title">${nomeCompleto}</div>
    <div class="kin-subtitle">Kin ${kinNum} de 260</div>
  </div>
  ${fraseCurta ? `<div class="kin-frase">"${fraseCurta}"</div>` : ''}
</div>

<div class="section">
  <div style="font-family:Cinzel;font-size:0.9rem;color:var(--gold);margin-bottom:1.5rem;text-transform:uppercase;text-align:center">Oráculo do Destino</div>
  <div class="oraculo-container">
    <div class="oraculo-item oraculo-central">
      <div class="selo-icon selo-${corSelo}">${emoji}</div>
      <div class="oraculo-nome">${seloBase}</div>
    </div>
    <div class="oraculo-item oraculo-side oraculo-guia">
      <div class="selo-icon selo-${getSeloCor(guia)}">${getSeloEmoji(guia)}</div>
      <div class="oraculo-nome">Guia<br>${getSeloBase(guia)}</div>
    </div>
    <div class="oraculo-item oraculo-side oraculo-analogo">
      <div class="selo-icon selo-${getSeloCor(analogo)}">${getSeloEmoji(analogo)}</div>
      <div class="oraculo-nome">Análogo<br>${getSeloBase(analogo)}</div>
    </div>
    <div class="oraculo-item oraculo-side oraculo-antipoda">
      <div class="selo-icon selo-${getSeloCor(antipoda)}">${getSeloEmoji(antipoda)}</div>
      <div class="oraculo-nome">Antípoda<br>${getSeloBase(antipoda)}</div>
    </div>
    <div class="oraculo-item oraculo-side oraculo-oculto">
      <div class="selo-icon selo-${getSeloCor(oculto)}">${getSeloEmoji(oculto)}</div>
      <div class="oraculo-nome">Oculto<br>${getSeloBase(oculto)}</div>
    </div>
  </div>
</div>

<div class="section">
  <div style="font-family:Cinzel;font-size:0.9rem;color:var(--gold);margin-bottom:1rem;text-transform:uppercase">Onda Encantada ${ondaNum} - Dia ${diaOnda}</div>
  <p class="info-text">Propósito: ${ondaSelo.acao || ''}</p>
  ${ondaHTML}
  <div class="info-box">
    <div style="font-family:Cinzel;font-size:0.85rem;color:var(--text);margin-bottom:0.5rem">${tomOriginal.toUpperCase()}: ${tomInfo.verbo || ''}</div>
    <p class="info-text">${tomInfo.pergunta || ''}</p>
  </div>
</div>

<div class="grid-2">
  <div class="section">
    <div style="font-family:Cinzel;font-size:0.85rem;color:var(--gold);margin-bottom:1rem;text-transform:uppercase">Informações</div>
    <div style="margin-bottom:1.5rem">
      <div style="font-family:Cinzel;font-size:0.9rem;color:var(--text);margin-bottom:0.5rem">${casteloTexto}</div>
      ${casteloOndasHTML}
    </div>
    <div style="margin-bottom:1.5rem">
      <div style="font-family:Cinzel;font-size:0.9rem;color:var(--text);margin-bottom:0.5rem">🌙 ${luaNome}</div>
      ${luaHTML}
    </div>
    <div class="grid-3" style="margin-top:1.5rem">
      <div class="card">
        <div class="card-label">⭐ Anel Solar</div>
        <div style="font-size:2rem;text-align:center;margin:0.5rem 0">${anelEmoji}</div>
        <div class="card-val" style="text-align:center">${anelNome}<br><small style="font-size:0.75rem;color:var(--text2)">${anelAcao}</small></div>
      </div>
      <div class="card">
        <div class="card-label">⚡ Plasma</div>
        <div class="card-val">${plasma}</div>
      </div>
      <div class="card">
        <div class="card-label">Fase Lunar</div>
        <div class="card-val">${faseLunar}</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div style="font-family:Cinzel;font-size:0.85rem;color:var(--gold);margin-bottom:1rem;text-transform:uppercase">Prática Diária</div>
    <ul class="praticas-list">
      <li>Ouça a prece das 7 direções galácticas</li>
      <li>Ouça a meditação do selo</li>
      <li>Ouça o Self Design Sounds</li>
      <li>Faça a leitura da página ${diaOnda} do e-book</li>
      <li>${ritual.ritual || ''}</li>
    </ul>
  </div>
</div>
  `;
}


function calcNatal() {
  const v = document.getElementById('nasc-inp').value;
  if (!v) return;
  const [y, m, d] = v.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const k = dateToKin(dt);
  document.getElementById('res-natal').innerHTML = kinHTML(k);
  document.getElementById('res-natal').classList.remove('hidden');
}

function loadToday() {
  const k = dateToKin(new Date());
  document.getElementById('res-dia').innerHTML = kinHTML(k);
}

</script>
</body>
</html>

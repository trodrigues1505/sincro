<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sincronário das 13 Luas - Completo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ===== DESIGN SYSTEM — SINCRONÁRIO ===== */
:root {
  --bg:      #0b110d;
  --bg2:     #0f1610;
  --card:    #131c14;
  --card2:   #192219;
  --green:   #009739;
  --green2:  #00b544;
  --green3:  #007a2e;
  --green-s: rgba(0,151,57,0.10);
  --gold:    #A57C00;
  --gold2:   #c9a030;
  --brown:   #3C2F2F;
  --border:  rgba(0,151,57,0.18);
  --border2: rgba(0,151,57,0.35);
  --border-g: rgba(165,124,0,0.22);
  --text:    #d8eedd;
  --text2:   #7a9a7a;
  --text3:   #3e5e3e;
  --red:     #a02820;
  --white:   #c8c0a8;
  --blue:    #1a5878;
  --radius:  8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;font-size:16px;line-height:1.65;min-height:100vh}

/* ── LOGIN ── */
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.login-box{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:2.8rem 2.4rem;max-width:360px;width:100%;text-align:center;box-shadow:0 0 80px rgba(0,151,57,0.05)}
.login-box h1{font-family:'Cinzel',serif;font-size:1.35rem;color:var(--green2);margin-bottom:0.3rem;letter-spacing:0.06em}
.login-divider{width:24px;height:1px;background:var(--green3);margin:0.9rem auto;opacity:0.6}
.login-box p{color:var(--text3);margin-bottom:1.7rem;font-size:0.83rem}
.btn-google{background:var(--card2);color:var(--text2);border:1px solid var(--border);border-radius:6px;padding:10px 20px;font-family:'Cinzel',serif;font-size:0.76rem;cursor:pointer;display:inline-flex;align-items:center;gap:10px;transition:border-color 0.2s,color 0.2s;letter-spacing:0.04em}
.btn-google:hover{border-color:var(--green2);color:var(--text)}
.error-msg{background:rgba(160,40,32,0.1);border:1px solid rgba(160,40,32,0.3);color:#b86858;padding:0.7rem 0.9rem;border-radius:6px;margin-top:1rem;font-size:0.82rem}
.loading{color:var(--text3);margin-top:1rem;font-style:italic;font-size:0.84rem}

/* ── LAYOUT ── */
.container{max-width:980px;margin:0 auto;padding:1rem;display:none}
.container.active{display:block}
h1{font-family:'Cinzel',serif;font-size:1.45rem;color:var(--green2);text-align:center;margin-bottom:0.2rem;letter-spacing:0.06em}

/* ── USER BAR ── */
.user-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:0.65rem 1rem;margin-bottom:0.9rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:7px}
.user-avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--green3)}

/* ── BOTÕES ── */
.btn-logout,.btn-admin,.btn-export{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text3);padding:5px 11px;font-family:'Cinzel',serif;font-size:0.6rem;cursor:pointer;text-transform:uppercase;letter-spacing:0.07em;transition:all 0.2s}
.btn-logout:hover,.btn-export:hover{border-color:var(--green3);color:var(--text2)}
.btn-admin{border-color:var(--border-g);color:var(--gold)}
.btn-admin:hover{background:rgba(165,124,0,0.12);border-color:var(--gold2)}

/* ── TABS ── */
.tabs{display:flex;margin-bottom:0.9rem;border-bottom:1px solid var(--border)}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:'Cinzel',serif;font-size:0.62rem;padding:8px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:0.09em;transition:color 0.2s,border-color 0.2s;margin-bottom:-1px}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--green2);border-bottom-color:var(--green)}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── SECTIONS ── */
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:0.6rem}
.section-title{font-family:'Cinzel',serif;font-size:0.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.13em;margin-bottom:0.9rem;display:flex;align-items:center;gap:0.5rem}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── KIN HERO ── */
.kin-hero{text-align:center;padding:2rem 1.3rem 1.6rem;background:var(--card2);border-radius:var(--radius);margin-bottom:0.6rem;border:1px solid var(--border2);position:relative;overflow:hidden}
.kin-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green3),var(--green2),var(--green3),transparent)}
.kin-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(165,124,0,0.35),transparent)}
.kin-num{font-family:'Cinzel',serif;font-size:0.58rem;color:var(--text3);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:0.7rem}
.kin-title{font-family:'Cinzel',serif;font-size:1.65rem;margin:0.25rem 0 0.45rem;letter-spacing:0.03em;color:var(--green2);line-height:1.2}
.kin-subtitle{color:var(--text3);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em}
.kin-frase{color:var(--text2);font-size:0.9rem;font-style:italic;margin:1.1rem auto 0;padding:0.85rem 1.1rem;background:var(--green-s);border-left:2px solid var(--green3);max-width:640px;line-height:1.9}

/* ── CARDS ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:6px;margin:0.8rem 0}
.card{background:var(--bg2);border-radius:6px;padding:0.85rem 0.95rem;border:1px solid var(--border);transition:border-color 0.2s}
.card:hover{border-color:var(--border2)}
.card-label{font-size:0.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.11em;margin-bottom:4px}
.card-val{font-family:'Cinzel',serif;font-size:0.85rem;color:var(--text)}

/* ── SELOS ── */
.selo-icon{border-radius:6px;display:flex;align-items:center;justify-content:center;border:1px solid;margin:0 auto 0.5rem;overflow:hidden}
.selo-red   {background:rgba(160,40,32,0.13);border-color:rgba(160,40,32,0.35)}
.selo-white {background:rgba(200,192,172,0.06);border-color:rgba(200,192,172,0.2)}
.selo-blue  {background:rgba(26,88,120,0.13);border-color:rgba(26,88,120,0.35)}
.selo-yellow{background:rgba(165,124,0,0.11);border-color:rgba(165,124,0,0.32)}

/* ── ORÁCULO ── */
.oraculo-grid{display:grid;grid-template-columns:1fr auto 1fr;grid-template-rows:auto auto auto;gap:10px;align-items:center;justify-items:center;margin:0.7rem auto;max-width:340px}
.oraculo-cell-top   {grid-column:2;grid-row:1}
.oraculo-cell-left  {grid-column:1;grid-row:2}
.oraculo-cell-center{grid-column:2;grid-row:2}
.oraculo-cell-right {grid-column:3;grid-row:2}
.oraculo-cell-bottom{grid-column:2;grid-row:3}
.oraculo-item{text-align:center}
.oraculo-central .selo-icon{width:74px;height:74px;border-radius:8px}
.oraculo-side .selo-icon   {width:55px;height:55px;border-radius:6px}
.oraculo-nome{font-size:0.55rem;margin-top:0.28rem;color:var(--text3);font-family:'Cinzel',serif;letter-spacing:0.04em;line-height:1.3}

/* ── ONDA ENCANTADA ── */
.onda-wrap{display:flex;justify-content:center;margin:0.7rem 0}
.onda-L{display:grid;grid-template-columns:repeat(4,var(--cell));grid-template-rows:repeat(4,var(--cell));--cell:58px;gap:4px}
.onda-L .onda-kin:nth-child(1) {grid-column:1;grid-row:1}
.onda-L .onda-kin:nth-child(2) {grid-column:2;grid-row:1}
.onda-L .onda-kin:nth-child(3) {grid-column:3;grid-row:1}
.onda-L .onda-kin:nth-child(4) {grid-column:4;grid-row:1}
.onda-L .onda-kin:nth-child(5) {grid-column:1;grid-row:2}
.onda-L .onda-kin:nth-child(6) {grid-column:1;grid-row:3}
.onda-L .onda-kin:nth-child(7) {grid-column:1;grid-row:4}
.onda-L .onda-kin:nth-child(8) {grid-column:2;grid-row:4}
.onda-L .onda-kin:nth-child(9) {grid-column:3;grid-row:4}
.onda-L .onda-kin:nth-child(10){grid-column:4;grid-row:2}
.onda-L .onda-kin:nth-child(11){grid-column:4;grid-row:3}
.onda-L .onda-kin:nth-child(12){grid-column:4;grid-row:4}
.onda-L .onda-kin:nth-child(13){grid-column:2/4;grid-row:2/4;width:auto;height:auto}
.onda-kin{width:var(--cell);height:var(--cell);border-radius:5px;display:flex;align-items:center;justify-content:center;border:1px solid;cursor:pointer;overflow:hidden;transition:transform 0.14s,box-shadow 0.14s}
.onda-kin:hover{transform:scale(1.08)}
.onda-kin.active{box-shadow:0 0 0 2px var(--green);border-color:var(--green)!important}
.cor-red   {background:rgba(160,40,32,0.13);border-color:rgba(160,40,32,0.35)}
.cor-white {background:rgba(200,192,172,0.05);border-color:rgba(200,192,172,0.18)}
.cor-blue  {background:rgba(26,88,120,0.13);border-color:rgba(26,88,120,0.35)}
.cor-yellow{background:rgba(165,124,0,0.11);border-color:rgba(165,124,0,0.32)}

/* ── PRÁTICAS ── */
.praticas-list{list-style:none;padding:0}
.praticas-list li{padding:0.6rem 0.85rem;margin-bottom:4px;background:var(--bg2);border-radius:5px;border-left:2px solid var(--green3);display:flex;align-items:flex-start;gap:8px;font-size:0.86rem;line-height:1.5;transition:border-color 0.2s}
.praticas-list li:hover{border-left-color:var(--green2)}
.praticas-list li::before{content:'·';color:var(--green2);font-size:1.1rem;flex-shrink:0;line-height:1.3}

/* ── MISC ── */
.hidden{display:none}
input[type="date"]{background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-family:inherit;color-scheme:dark;font-size:0.87rem;transition:border-color 0.2s}
input[type="date"]:focus{outline:none;border-color:var(--green)}
.btn-calc{background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--green2);font-family:'Cinzel',serif;font-size:0.63rem;padding:7px 15px;cursor:pointer;text-transform:uppercase;letter-spacing:0.07em;transition:all 0.2s}
.btn-calc:hover{background:var(--green);color:#fff;border-color:var(--green)}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:0.6rem}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:0.55rem}
.tooltip{position:relative;cursor:help}
.tooltip:hover::after{content:attr(data-tooltip);position:absolute;bottom:calc(100%+5px);left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text2);padding:0.3rem 0.7rem;border-radius:4px;border:1px solid var(--border);white-space:nowrap;z-index:1000;font-size:0.63rem}
.info-text{color:var(--text2);font-size:0.82rem;line-height:1.65;margin:0.28rem 0}
.info-box{background:var(--bg2);padding:0.75rem 0.85rem;border-radius:5px;border-left:2px solid var(--green3);margin:0.55rem 0}

/* ── LUA GALÁCTICA ── */
.lua-grid{display:flex;gap:3px}
.lua-col{display:flex;flex-direction:column;gap:3px}
.lua-dia{width:26px;height:26px;background:var(--bg2);border:1px solid;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:0.52rem;font-weight:600;transition:all 0.14s;font-family:'Cinzel',serif}
.lua-dia.active{background:var(--green);color:#fff;border-color:var(--green)}
.lua-red   {border-color:rgba(160,40,32,0.38);color:rgba(160,40,32,0.62)}
.lua-white {border-color:rgba(200,192,172,0.2);color:rgba(200,192,172,0.52)}
.lua-blue  {border-color:rgba(26,88,120,0.38);color:rgba(26,88,120,0.72)}
.lua-yellow{border-color:rgba(165,124,0,0.32);color:rgba(165,124,0,0.65)}
.lua-red.active,.lua-white.active,.lua-blue.active,.lua-yellow.active{color:#fff}

/* ===== MEDIA QUERIES ===== */
@media (max-width:600px){
  body{font-size:15px}
  .container{padding:0.75rem 0.65rem}
  h1{font-size:1.2rem}
  .user-bar{padding:0.6rem 0.7rem;flex-direction:column;align-items:flex-start}
  .user-bar>div:last-child{width:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
  .btn-logout,.btn-admin,.btn-export{width:100%;text-align:center;font-size:0.56rem;padding:5px 6px}
  .section{padding:0.85rem}
  .kin-hero{padding:1.2rem 0.9rem 1rem}
  .kin-title{font-size:1.2rem}
  .kin-frase{font-size:0.83rem;padding:0.75rem 0.85rem}
  .oraculo-grid{gap:6px;max-width:290px}
  .oraculo-central .selo-icon{width:60px;height:60px}
  .oraculo-side .selo-icon{width:46px;height:46px}
  .oraculo-nome{font-size:0.51rem}
  .onda-L{--cell:48px;gap:3px}
  .cards{grid-template-columns:1fr 1fr;gap:5px}
  .grid-2,.grid-3{grid-template-columns:1fr;gap:0.55rem}
  input[type="date"]{width:100%}
  .btn-calc{width:100%;margin-top:5px}
  .tab{padding:7px 10px;font-size:0.58rem}
  .lua-dia{width:22px;height:22px;font-size:0.47rem}
  .lua-grid{gap:2px}
  .lua-col{gap:2px}
}
@media (max-width:400px){
  .container{padding:0.65rem 0.5rem}
  h1{font-size:1rem}
  .kin-title{font-size:1rem}
  .oraculo-grid{max-width:256px;gap:5px}
  .oraculo-central .selo-icon{width:52px;height:52px}
  .oraculo-side .selo-icon{width:40px;height:40px}
  .onda-L{--cell:40px;gap:3px}
  .lua-dia{width:19px;height:19px;font-size:0.42rem}
  .cards{grid-template-columns:1fr}
}
@media (max-height:500px) and (orientation:landscape){
  .kin-hero{padding:0.75rem 0.9rem}
  .kin-title{font-size:1.05rem}
  .kin-frase{font-size:0.78rem;padding:0.6rem}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<script>
// DADOS E CONFIGURAÇÕES
let DATA = {};
const DATA_PRONTO = fetch('./sincronario_dados.json')
  .then(r => r.json())
  .then(d => {
    DATA = d;
    console.log('✓ Dados carregados:', Object.keys(DATA.kins).length, 'kins');
  })
  .catch(e => console.warn('⚠️ Erro ao carregar JSON:', e));

const EMOJIS = ['🐉', '💨', '🌌', '🌱', '🐍', '☯️', '✋', '⭐', '🌙', '🐕', '🐒', '👤', '🚶', '🧙', '🦅', '⚔️', '🌍', '🪞', '⛈️', '☀️'];
const CORES_SELO = ['red', 'white', 'blue', 'yellow', 'red', 'white', 'blue', 'yellow', 'red', 'white', 'blue', 'yellow', 'red', 'white', 'blue', 'yellow', 'red', 'white', 'blue', 'yellow'];
const CORES_ONDA = ['red', 'red', 'red', 'red', 'white', 'white', 'white', 'white', 'blue', 'blue', 'blue', 'blue', 'yellow'];
const FEMININOS = new Set(['Noite', 'Serpente', 'Mão', 'Estrela', 'Lua', 'Águia', 'Terra', 'Semente', 'Tormenta']);

function getSeloEmoji(nome) {
  const nomes = ['Dragão', 'Vento', 'Noite', 'Semente', 'Serpente', 'Enlaçador', 'Mão', 'Estrela', 'Lua', 'Cão', 'Macaco', 'Humano', 'Caminhante', 'Mago', 'Águia', 'Guerreiro', 'Terra', 'Espelho', 'Tormenta', 'Sol'];
  const idx = nomes.findIndex(s => nome.includes(s));
  return idx >= 0 ? EMOJIS[idx] : '🌀';
}


function getSeloIconURL(nomeCompleto) {
  const partes = nomeCompleto.split(' ');
  const nomeBase = partes.slice(0, -1).join(' ');
  const mapa = {
    'Dragão': './assets/icons/dragao.png',
    'Vento': './assets/icons/vento.png',
    'Noite': './assets/icons/noite.png',
    'Semente': './assets/icons/semente.png',
    'Serpente': './assets/icons/serpente.png',
    'Enlaçador': './assets/icons/enlacador.png',
    'Enlaçador de Mundos': './assets/icons/enlacador.png',
    'Mão': './assets/icons/mao.png',
    'Estrela': './assets/icons/estrela.png',
    'Lua': './assets/icons/lua.png',
    'Cão': './assets/icons/cao.png',
    'Cachorro': './assets/icons/cao.png',
    'Macaco': './assets/icons/macaco.png',
    'Humano': './assets/icons/humano.png',
    'Caminhante': './assets/icons/caminhante.png',
    'Caminhante do Céu': './assets/icons/caminhante.png',
    'Mago': './assets/icons/mago.png',
    'Feiticeiro': './assets/icons/mago.png',

function getSeloBase(nomeCompleto) {
  const partes = nomeCompleto.split(' ');
  return partes.slice(0, -1).join(' ');
}

function getSeloCor(nomeCompleto) {
  const partes = nomeCompleto.split(' ');
  return partes[partes.length - 1].toLowerCase();
}

function concordar(selo, tom) {
  for (let p of FEMININOS) {
    if (selo.includes(p)) {
      return tom
        .replace('Magnético', 'Magnética')
        .replace('Lunar', 'Lunar')
        .replace('Elétrico', 'Elétrica')
        .replace('Autoexistente', 'Autoexistente')
        .replace('Overtone', 'Overtone')
        .replace('Rítmico', 'Rítmica')
        .replace('Ressonante', 'Ressonante')
        .replace('Galáctico', 'Galáctica')
        .replace('Solar', 'Solar')
        .replace('Planetário', 'Planetária')
        .replace('Espectral', 'Espectral')
        .replace('Cristal', 'Cristal')
        .replace('Cósmico', 'Cósmica');
    }
  }
  return tom;
}

// CÁLCULOS DE DATA
function isLeapDay(d) {
  return d.getMonth() === 1 && d.getDate() === 29;
}

function daysBetween(f, t) {
  if (f > t) return -daysBetween(t, f);
  let c = 0;
  const d = new Date(f.getTime());
  while (d < t) {
    d.setDate(d.getDate() + 1);
    if (!isLeapDay(d)) c++;
  }
  return c;
}

function dateToKin(dt) {
  if (isLeapDay(dt)) return dateToKin(new Date(dt.getFullYear(), 1, 28));
  const base = new Date(1987, 6, 26);
  const dias = daysBetween(base, dt);
  return ((34 - 1 + dias) % 260 + 260) % 260 + 1;
}

function getFaseLunar(d) {
  const lc = 29.53;
  const nk = new Date(2000, 0, 6, 18, 14);
  const df = (d - nk) / (1000 * 60 * 60 * 24);
  const ph = (df % lc) / lc;
  if (ph < 0.03 || ph > 0.97) return '🌑 Nova';
  if (ph < 0.28) return '🌒 Crescente';
  if (ph < 0.53) return '🌕 Cheia';
  if (ph < 0.78) return '🌘 Minguante';
  return '🌑 Nova';
}

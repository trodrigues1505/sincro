<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin - Sincronário</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c14;--bg2:#11142a;--card:#161b30;--border:rgba(180,154,240,0.18);--gold:#c9a84c;--text:#ece9f5;--text2:#9892b0;--text3:#6a647a;--radius:12px;--green:#4caf50;--red:#d63b3b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;font-size:17px;line-height:1.6;min-height:100vh;padding:2rem}
.container{max-width:1200px;margin:0 auto}
h1{font-family:'Cinzel',serif;font-size:2rem;color:var(--gold);margin-bottom:0.5rem}
.subtitle{color:var(--text2);margin-bottom:2rem}
.back-btn{background:rgba(180,154,240,0.1);border:0.5px solid var(--border);border-radius:8px;color:var(--text2);padding:8px 16px;font-family:'Cinzel',serif;font-size:0.75rem;cursor:pointer;text-transform:uppercase;text-decoration:none;display:inline-block;margin-bottom:1.5rem}
.back-btn:hover{background:rgba(180,154,240,0.2)}
.section{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.section-title{font-family:'Cinzel',serif;font-size:0.85rem;color:var(--gold);text-transform:uppercase;margin-bottom:1rem;letter-spacing:0.15em}
.user-list{display:grid;gap:12px}
.user-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:1rem;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}
.user-avatar{width:48px;height:48px;border-radius:50%;border:2px solid var(--gold)}
.user-info{}
.user-name{font-family:'Cinzel',serif;font-size:1rem;color:var(--text)}
.user-email{font-size:0.85rem;color:var(--text2)}
.user-status{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;margin-top:4px}
.status-authorized{color:var(--green)}
.status-pending{color:var(--gold)}
.user-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:none;border-radius:6px;padding:8px 14px;font-family:'Cinzel',serif;font-size:0.7rem;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;transition:all 0.2s}
.btn-authorize{background:var(--green);color:#fff}
.btn-revoke{background:var(--red);color:#fff}
.btn-make-admin{background:var(--gold);color:var(--bg)}
.btn-remove-admin{background:rgba(201,168,76,0.2);border:0.5px solid var(--gold);color:var(--gold)}
.btn-delete{background:rgba(214,59,59,0.1);border:0.5px solid var(--red);color:var(--red)}
.btn:hover{opacity:0.9;transform:translateY(-1px)}
.loading{text-align:center;padding:2rem;color:var(--text2)}
.empty{text-align:center;padding:2rem;color:var(--text3);font-style:italic}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{background:var(--card);border:0.5px solid var(--border);border-radius:8px;padding:1.25rem;text-align:center}
.stat-number{font-family:'Cinzel',serif;font-size:2rem;color:var(--gold);margin-bottom:0.5rem}
.stat-label{font-size:0.8rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back-btn">← Voltar ao App</a>

<h1>🔐 Painel de Administração</h1>
<p class="subtitle">Gerencie usuários e permissões</p>

<div class="stats">
<div class="stat-card">
<div class="stat-number" id="stat-total">0</div>
<div class="stat-label">Total de Usuários</div>
</div>
<div class="stat-card">
<div class="stat-number" id="stat-authorized">0</div>
<div class="stat-label">Autorizados</div>
</div>
<div class="stat-card">
<div class="stat-number" id="stat-pending">0</div>
<div class="stat-label">Pendentes</div>
</div>
<div class="stat-card">
<div class="stat-number" id="stat-admins">0</div>
<div class="stat-label">Administradores</div>
</div>
</div>

<div class="section">
<div class="section-title">👤 Usuários Pendentes</div>
<div id="pending-users" class="user-list">
<div class="loading">Carregando...</div>
</div>
</div>

<div class="section">
<div class="section-title">✅ Usuários Autorizados</div>
<div id="authorized-users" class="user-list">
<div class="loading">Carregando...</div>
</div>
</div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// ⚠️ SUBSTITUA COM SUAS CREDENCIAIS DO FIREBASE (mesmas do index.html)
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyDOf77LceD2eKXlewRxxJT60hiBIlRJrJY",
  authDomain: "sincro13luas.firebaseapp.com",
  projectId: "sincro13luas",
  storageBucket: "sincro13luas.firebasestorage.app",
  messagingSenderId: "886057704979",
  appId: "1:886057704979:web:31b8348110ff8649c369e6"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Verificar se é admin
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = 'index.html';
    return;
  }
  
  const userDoc = await getDoc(doc(db, 'users', user.uid));
  if (!userDoc.exists() || userDoc.data().role !== 'admin') {
    alert('Acesso negado. Apenas administradores podem acessar esta página.');
    window.location.href = 'index.html';
    return;
  }
  
  loadUsers();
});

async function loadUsers() {
  try {
    const usersSnapshot = await getDocs(collection(db, 'users'));
    const users = [];
    
    usersSnapshot.forEach(doc => {
      users.push({ id: doc.id, ...doc.data() });
    });
    
    // Estatísticas
    const total = users.length;
    const authorized = users.filter(u => u.authorized).length;
    const pending = users.filter(u => !u.authorized).length;
    const admins = users.filter(u => u.role === 'admin').length;
    
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-authorized').textContent = authorized;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-admins').textContent = admins;
    
    // Separar usuários
    const pendingUsers = users.filter(u => !u.authorized);
    const authorizedUsers = users.filter(u => u.authorized);
    
    renderUserList('pending-users', pendingUsers);
    renderUserList('authorized-users', authorizedUsers);
  } catch (error) {
    console.error('Erro ao carregar usuários:', error);
  }
}

function renderUserList(containerId, users) {
  const container = document.getElementById(containerId);
  
  if (users.length === 0) {
    container.innerHTML = '<div class="empty">Nenhum usuário nesta categoria</div>';
    return;
  }
  
  container.innerHTML = users.map(user => `
    <div class="user-item">
      <img src="${user.photoURL || '/api/placeholder/48/48'}" alt="${user.displayName}" class="user-avatar">
      <div class="user-info">
        <div class="user-name">${user.displayName || 'Sem nome'}</div>
        <div class="user-email">${user.email}</div>
        <div class="user-status ${user.authorized ? 'status-authorized' : 'status-pending'}">
          ${user.authorized ? '✓ Autorizado' : '⏳ Pendente'} 
          ${user.role === 'admin' ? '· 👑 Admin' : ''}
        </div>
      </div>
      <div class="user-actions">
        ${!user.authorized ? `
          <button class="btn btn-authorize" onclick="authorizeUser('${user.id}')">Autorizar</button>
        ` : `
          <button class="btn btn-revoke" onclick="revokeUser('${user.id}')">Revogar</button>
        `}
        ${user.authorized && user.role !== 'admin' ? `
          <button class="btn btn-make-admin" onclick="makeAdmin('${user.id}')">Tornar Admin</button>
        ` : ''}
        ${user.role === 'admin' ? `
          <button class="btn btn-remove-admin" onclick="removeAdmin('${user.id}')">Remover Admin</button>
        ` : ''}
        <button class="btn btn-delete" onclick="deleteUser('${user.id}')">Excluir</button>
      </div>
    </div>
  `).join('');
}

window.authorizeUser = async (userId) => {
  if (!confirm('Autorizar este usuário?')) return;
  await updateDoc(doc(db, 'users', userId), { authorized: true });
  loadUsers();
};

window.revokeUser = async (userId) => {
  if (!confirm('Revogar acesso deste usuário?')) return;
  await updateDoc(doc(db, 'users', userId), { authorized: false });
  loadUsers();
};

window.makeAdmin = async (userId) => {
  if (!confirm('Tornar este usuário administrador?')) return;
  await updateDoc(doc(db, 'users', userId), { role: 'admin' });
  loadUsers();
};

window.removeAdmin = async (userId) => {
  const currentUser = auth.currentUser;
  if (userId === currentUser.uid) {
    alert('Você não pode remover seu próprio cargo de admin!');
    return;
  }
  if (!confirm('Remover privilégios de administrador?')) return;
  await updateDoc(doc(db, 'users', userId), { role: 'user' });
  loadUsers();
};

window.deleteUser = async (userId) => {
  const currentUser = auth.currentUser;
  if (userId === currentUser.uid) {
    alert('Você não pode excluir sua própria conta!');
    return;
  }
  if (!confirm('ATENÇÃO: Isso excluirá permanentemente o usuário. Confirmar?')) return;
  await deleteDoc(doc(db, 'users', userId));
  loadUsers();
};
</script>
</body>
</html>

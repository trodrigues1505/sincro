<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Painel Admin — Sincronário</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#009739">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#071209;--bg2:#0a1a0c;--card:#0d1f0f;--card2:#112613;
  --green:#009739;--green2:#00b544;--green3:#006828;
  --gold:#A57C00;--gold2:#c9a030;--gold3:#e0c070;
  --border:rgba(0,151,57,.20);--border2:rgba(0,151,57,.40);--border-g:rgba(165,124,0,.28);
  --text:#c0dcc4;--text2:#5a8860;--text3:#2e5034;
  --red:#8a2018;--radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;font-size:16px;line-height:1.65;min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim-1{animation:fadeUp .28s both}
.anim-2{animation:fadeUp .28s .1s both}
.anim-3{animation:fadeUp .28s .2s both}
.anim-4{animation:fadeUp .28s .3s both}
.anim-5{animation:fadeUp .28s .4s both}

.container{max-width:820px;margin:0 auto;padding:max(1rem,env(safe-area-inset-top,0px)) 1rem 1rem}
h1{font-family:'Cinzel',serif;font-size:1.35rem;color:var(--gold2);text-align:center;margin-bottom:.2rem;letter-spacing:.06em}

.user-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem 1rem;margin-bottom:.9rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:7px}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--green3)}
.btn-logout,.btn-back{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text3);padding:5px 11px;font-family:'Cinzel',serif;font-size:.6rem;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;transition:all .2s}
.btn-logout:hover{border-color:var(--green3);color:var(--text2)}
.btn-back{border-color:var(--border-g);color:var(--gold2)}
.btn-back:hover{background:var(--gold3);color:var(--bg);border-color:var(--gold2)}

.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:.6rem}
.section-title{font-family:'Cinzel',serif;font-size:.6rem;color:var(--gold);text-transform:uppercase;letter-spacing:.13em;margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem}
.section-title::after{content:'';flex:1;height:1px;background:var(--border-g)}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.6rem;margin-bottom:.8rem}
.dash-card{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:.9rem;text-align:center;transition:border-color .2s}
.dash-card:hover{border-color:var(--border2)}
.dash-num{font-family:'Cinzel',serif;font-size:1.6rem;color:var(--green2);margin-bottom:.2rem}
.dash-label{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.09em}
.dash-sub{font-size:.72rem;color:var(--text2);margin-top:.2rem}

/* ── TIPO BADGES ── */
.tipo-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.8rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.tipo-badge{padding:3px 10px;border-radius:20px;font-family:'Cinzel',serif;font-size:.58rem;text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.tipo-badge.admin{background:rgba(165,124,0,.15);color:var(--gold2);border:1px solid rgba(165,124,0,.4)}
.tipo-badge.usuario{background:rgba(0,151,57,.12);color:var(--green2);border:1px solid rgba(0,151,57,.3)}
.tipo-badge.pendente{background:rgba(165,124,0,.08);color:var(--gold);border:1px solid rgba(165,124,0,.2)}
.tipo-count{font-size:.72rem;color:var(--text3);font-style:italic}

/* ── USER ITEMS ── */
.user-item{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:.85rem;margin-bottom:.45rem;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;transition:border-color .2s}
.user-item:hover{border-color:var(--border2)}
.user-item.is-admin{border-left:2px solid var(--gold)}
.user-item.is-usuario{border-left:2px solid var(--green3)}
.user-item.is-pendente{border-left:2px solid rgba(165,124,0,.4)}
.user-item:last-child{margin-bottom:0}

.user-details{flex:1;min-width:180px}
.user-nome{font-family:'Cinzel',serif;color:var(--text);font-size:.78rem;margin-bottom:2px}
.user-email{color:var(--gold2);font-size:.75rem}
.user-uid{font-size:.58rem;color:var(--text3);word-break:break-all;margin-top:3px}
.user-meta{font-size:.62rem;color:var(--text3);margin-top:3px;display:flex;gap:.5rem;flex-wrap:wrap}
.user-status{display:flex;flex-wrap:wrap;gap:5px;align-items:center;justify-content:flex-end;min-width:200px}

.badge{padding:2px 8px;border-radius:3px;font-size:.6rem;text-transform:uppercase;font-weight:600;letter-spacing:.05em}
.badge.authorized{background:rgba(0,151,57,.12);color:#3dd870;border:1px solid rgba(0,151,57,.3)}
.badge.pending{background:rgba(165,124,0,.1);color:var(--gold2);border:1px solid rgba(165,124,0,.27)}
.badge.admin{background:rgba(165,124,0,.14);color:var(--gold2);border:1px solid rgba(165,124,0,.38)}

.btn-authorize,.btn-admin-toggle,.btn-remove{border:1px solid;border-radius:4px;padding:5px 10px;font-family:'Cinzel',serif;font-size:.58rem;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:all .2s;background:transparent}
.btn-authorize{color:var(--green2);border-color:rgba(0,151,57,.35)}
.btn-authorize:hover{background:var(--green);color:#fff;border-color:var(--green)}
.btn-admin-toggle{color:var(--gold2);border-color:rgba(165,124,0,.35)}
.btn-admin-toggle:hover{background:rgba(165,124,0,.18);border-color:var(--gold2)}
.btn-remove{color:var(--red);border-color:rgba(138,32,24,.32)}
.btn-remove:hover{background:var(--red);color:#fff;border-color:var(--red)}

.loading{color:var(--text3);text-align:center;padding:1rem;font-style:italic;font-size:.84rem}
.empty{color:var(--text3);text-align:center;padding:1.8rem;font-style:italic;font-size:.84rem}

/* ── AVISO FORM ── */
.aviso-form{display:flex;flex-direction:column;gap:.6rem}
.aviso-input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.7rem .9rem;font-family:'Crimson Pro',serif;font-size:.9rem;resize:vertical;min-height:80px;transition:border-color .2s}
.aviso-input:focus{outline:none;border-color:var(--green)}
.aviso-input-linha{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.6rem .9rem;font-family:'Crimson Pro',serif;font-size:.9rem;transition:border-color .2s}
.aviso-input-linha:focus{outline:none;border-color:var(--green)}
.aviso-btns{display:flex;gap:.5rem;flex-wrap:wrap}
.btn-aviso-pub{background:var(--green);border:none;border-radius:5px;color:#fff;font-family:'Cinzel',serif;font-size:.65rem;padding:8px 16px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:background .2s}
.btn-aviso-pub:hover{background:var(--green2)}
.btn-aviso-del{background:transparent;border:1px solid rgba(138,32,24,.4);border-radius:5px;color:var(--red);font-family:'Cinzel',serif;font-size:.65rem;padding:8px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .2s}
.btn-aviso-del:hover{background:var(--red);color:#fff}
.aviso-status{font-size:.8rem;color:var(--green2);font-style:italic;margin-top:.3rem}

/* ── MODAL ── */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.82);z-index:1000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:1.7rem;max-width:360px;width:90%}
.modal-content h3{color:var(--gold2);margin-bottom:.65rem;font-family:'Cinzel',serif;font-size:.88rem;letter-spacing:.05em}
.modal-content p{color:var(--text2);margin-bottom:1.3rem;font-size:.87rem}
.modal-buttons{display:flex;gap:6px;justify-content:flex-end}
.btn-confirm,.btn-cancel{padding:6px 14px;border:1px solid;border-radius:4px;font-family:'Cinzel',serif;cursor:pointer;text-transform:uppercase;font-size:.6rem;letter-spacing:.05em;transition:all .2s;background:transparent}
.btn-confirm{color:var(--red);border-color:rgba(138,32,24,.42)}
.btn-confirm:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn-cancel{color:var(--text2);border-color:var(--border)}
.btn-cancel:hover{border-color:var(--green3);color:var(--text2)}

/* ── SEPARADOR DE SEÇÃO ── */
.secao-usuarios{margin-bottom:1.2rem}
.secao-usuarios:last-child{margin-bottom:0}

@media(max-width:768px){
  .container{padding:.9rem .75rem}
  h1{font-size:1.15rem}
  .user-bar{flex-direction:column;align-items:flex-start;padding:.65rem}
  .user-bar>div:last-child{width:100%;display:flex;gap:5px;flex-wrap:wrap}
  .btn-logout,.btn-back{flex:1;text-align:center;font-size:.57rem;padding:5px 8px}
  .user-item{flex-direction:column;gap:7px}
  .user-status{width:100%;flex-direction:column;min-width:auto;gap:4px}
  .btn-authorize,.btn-admin-toggle,.btn-remove{width:100%}
}
@media(max-width:480px){
  body{font-size:14px}
  .container{padding:.75rem .6rem}
  h1{font-size:.98rem}
  .section{padding:.8rem;margin-bottom:.45rem}
  .user-item{padding:.7rem;gap:6px}
  .user-email{font-size:.72rem}
  .user-uid{font-size:.55rem}
  .badge{padding:2px 6px;font-size:.55rem}
  .btn-authorize,.btn-admin-toggle,.btn-remove{padding:5px 8px;font-size:.54rem}
  .dash-grid{grid-template-columns:1fr 1fr;gap:.45rem}
  .dash-card{padding:.65rem}
  .dash-num{font-size:1.3rem}
  .modal-content{padding:1.3rem}
}
</style>
</head>
<body>

<div class="container">
  <div class="user-bar anim-1">
    <div class="user-info">
      <img id="user-avatar" class="user-avatar" src="" alt="">
      <div>
        <div id="user-name" style="font-family:Cinzel;color:var(--text);font-size:.85rem"></div>
        <div style="font-size:.58rem;color:var(--gold2);text-transform:uppercase;letter-spacing:.08em">Admin</div>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn-back" onclick="window.location.href='index.html'">← Voltar</button>
      <button class="btn-logout" id="btn-logout">Sair</button>
    </div>
  </div>

  <h1 class="anim-1">👑 Painel Admin</h1>
  <p style="text-align:center;color:var(--text3);margin-bottom:1.2rem;font-size:.82rem;font-style:italic">Gerenciar usuários e permissões</p>

  <!-- DASHBOARD -->
  <div class="dash-grid anim-2" id="dashboard"></div>

  <!-- AVISO -->
  <div class="section anim-2">
    <div class="section-title">📢 Aviso para Todos</div>
    <div class="aviso-form">
      <input class="aviso-input-linha" type="text" id="aviso-emoji" placeholder="Emoji (ex: 🌀)" style="max-width:120px">
      <textarea class="aviso-input" id="aviso-texto" placeholder="Escreva o aviso que aparecerá para todos os usuários ao abrir o app..."></textarea>
      <div class="aviso-btns">
        <button class="btn-aviso-pub" onclick="publicarAviso()">📢 Publicar Aviso</button>
        <button class="btn-aviso-del" onclick="removerAviso()">🗑 Remover Aviso Atual</button>
      </div>
      <div id="aviso-status" class="aviso-status"></div>
    </div>
    <div id="aviso-atual" style="margin-top:.8rem"></div>
  </div>

  <!-- TODOS OS USUÁRIOS — divididos por tipo -->
  <div class="section anim-3">
    <div class="section-title">👥 Usuários</div>
    <div id="all-users" class="loading">Carregando...</div>
  </div>

</div>

<!-- MODAL CONFIRMAÇÃO -->
<div id="confirm-modal" class="modal">
  <div class="modal-content">
    <h3 id="modal-title">Confirmar ação</h3>
    <p id="modal-message"></p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" id="modal-confirm">Confirmar</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyDOf77LceD2eKXlewRxxJT60hiBIlRJrJY",authDomain:"sincro13luas.firebaseapp.com",projectId:"sincro13luas",storageBucket:"sincro13luas.firebasestorage.app",messagingSenderId:"886057704979",appId:"1:886057704979:web:31b8348110ff8649c369e6"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

let currentUser=null,currentAction=null,authInitialized=false;
const LOG='[AdminAuth]';
const RETRY={attempts:5,delay:500,timeout:5000};

auth.onAuthStateChanged(async(user)=>{
  if(user){
    try{
      const doc=await obterDocComRetry(user.uid);
      if(!doc){mostrarErro('Documento não encontrado','Seu perfil não foi encontrado.');return;}
      const d=doc.data();
      if(d.role!=='admin'){mostrarErro('Acesso Negado','Você não possui permissão de administrador.');return;}
      currentUser=user;authInitialized=true;
      document.getElementById('user-avatar').src=user.photoURL||'';
      document.getElementById('user-name').textContent=user.displayName||'Admin';
      try{await loadUsers();}catch(e){console.error(LOG,'loadUsers:',e);}
      try{await carregarDashboard();}catch(e){console.error(LOG,'dashboard:',e);}
      try{await carregarAvisoAtual();}catch(e){console.error(LOG,'aviso:',e);}
    }catch(err){mostrarErro('Erro de Autenticação',err.message||'Não foi possível verificar suas permissões.');}
  }else{
    window.location.href='index.html';
  }
});

async function obterDocComRetry(uid){
  const start=Date.now();let t=0;
  while(Date.now()-start<RETRY.timeout&&t<RETRY.attempts){
    try{const d=await db.collection('users').doc(uid).get();if(d.exists)return d;}catch(e){}
    t++;if(t<RETRY.attempts)await new Promise(r=>setTimeout(r,RETRY.delay));
  }
  return null;
}

function mostrarErro(titulo,msg){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(7,18,9,.96);display:flex;align-items:center;justify-content:center;z-index:9999';
  overlay.innerHTML=`<div style="background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:2rem;text-align:center;max-width:360px;width:90%">
    <div style="font-size:2.5rem;margin-bottom:1rem">🔐</div>
    <div style="font-family:Cinzel;font-size:1rem;color:var(--gold2);margin-bottom:.7rem">${titulo}</div>
    <p style="color:var(--text2);margin-bottom:1.5rem;font-size:.9rem;line-height:1.6">${msg}</p>
    <div style="display:flex;gap:8px;justify-content:center">
      <button onclick="window.location.href='index.html'" style="padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:Cinzel;font-size:.75rem;text-transform:uppercase">← Voltar</button>
      <button onclick="location.reload()" style="padding:8px 16px;background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-family:Cinzel;font-size:.75rem;text-transform:uppercase">🔄 Tentar novamente</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

document.getElementById('btn-logout').onclick=()=>auth.signOut();

// ══════════════════════════════════════════
// CARREGAR E RENDERIZAR USUÁRIOS POR TIPO
// ══════════════════════════════════════════
async function loadUsers(){
  try{
    const snapshot=await db.collection('users').get();
    const users=[];
    snapshot.forEach(doc=>users.push({id:doc.id,...doc.data()}));

    const admins=users.filter(u=>u.authorized&&u.role==='admin');
    const comuns=users.filter(u=>u.authorized&&u.role!=='admin');
    const pendentes=users.filter(u=>!u.authorized);

    // Dashboard stats
    const hoje=new Date();
    const inicioHoje=new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate());
    const inicioSemana=new Date(inicioHoje);inicioSemana.setDate(inicioHoje.getDate()-7);
    let ativos1d=0,ativos7d=0;
    users.forEach(u=>{
      if(u.ultimoAcesso){
        const ua=u.ultimoAcesso.toDate?u.ultimoAcesso.toDate():new Date(u.ultimoAcesso);
        if(ua>=inicioHoje)ativos1d++;
        if(ua>=inicioSemana)ativos7d++;
      }
    });

    document.getElementById('dashboard').innerHTML=[
      {num:users.length,label:'Total',sub:'cadastrados'},
      {num:users.filter(u=>u.authorized).length,label:'Autorizados',sub:'com acesso'},
      {num:pendentes.length,label:'Pendentes',sub:'aguardando'},
      {num:ativos1d,label:'Hoje',sub:'últ. 24h'},
      {num:ativos7d,label:'Esta Semana',sub:'últ. 7 dias'},
      {num:admins.length,label:'Admins',sub:''},
    ].map(i=>`<div class="dash-card"><div class="dash-num">${i.num}</div><div class="dash-label">${i.label}</div>${i.sub?`<div class="dash-sub">${i.sub}</div>`:''}</div>`).join('');

    // Montar HTML por blocos
    let html='';

    // ── BLOCO ADMINS ──
    html+=`<div class="secao-usuarios">
      <div class="tipo-header">
        <span class="tipo-badge admin">👑 Administradores</span>
        <span class="tipo-count">${admins.length} usuário${admins.length!==1?'s':''}</span>
      </div>`;
    if(admins.length===0){
      html+='<div class="empty">Nenhum administrador cadastrado</div>';
    }else{
      html+=admins.map(u=>renderUserItem(u,'admin')).join('');
    }
    html+='</div>';

    // ── BLOCO USUÁRIOS COMUNS ──
    html+=`<div class="secao-usuarios">
      <div class="tipo-header">
        <span class="tipo-badge usuario">✅ Usuários Autorizados</span>
        <span class="tipo-count">${comuns.length} usuário${comuns.length!==1?'s':''}</span>
      </div>`;
    if(comuns.length===0){
      html+='<div class="empty">Nenhum usuário comum autorizado</div>';
    }else{
      html+=comuns.map(u=>renderUserItem(u,'usuario')).join('');
    }
    html+='</div>';

    // ── BLOCO PENDENTES ──
    html+=`<div class="secao-usuarios">
      <div class="tipo-header">
        <span class="tipo-badge pendente">⏳ Pendentes de Autorização</span>
        <span class="tipo-count">${pendentes.length} usuário${pendentes.length!==1?'s':''}</span>
      </div>`;
    if(pendentes.length===0){
      html+='<div class="empty">✅ Ninguém aguardando autorização</div>';
    }else{
      html+=pendentes.map(u=>renderUserItem(u,'pendente')).join('');
    }
    html+='</div>';

    document.getElementById('all-users').innerHTML=html;

  }catch(err){
    console.error('loadUsers:',err);
    document.getElementById('all-users').innerHTML='<div class="empty">❌ Erro ao carregar usuários</div>';
  }
}

function renderUserItem(u,tipo){
  const isAdmin=u.role==='admin';
  const nome=u.displayName||'';
  const ultimoAcesso=u.ultimoAcesso?(()=>{
    const d=u.ultimoAcesso.toDate?u.ultimoAcesso.toDate():new Date(u.ultimoAcesso);
    return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  })():'nunca';

  let botoes='';
  if(tipo==='pendente'){
    botoes=`
      <button class="btn-authorize" onclick="authorize('${u.id}')">✅ Autorizar</button>
      <button class="btn-remove" onclick="removeUser('${u.id}')">🗑️ Remover</button>`;
  }else{
    botoes=`
      <button class="btn-admin-toggle" onclick="toggleAdmin('${u.id}',${isAdmin})">
        ${isAdmin?'👤 Remover Admin':'👑 Tornar Admin'}
      </button>
      <button class="btn-remove" onclick="removeUser('${u.id}')">🗑️ Remover</button>`;
  }

  return`<div class="user-item is-${tipo}">
    <div class="user-details">
      ${nome?`<div class="user-nome">${nome}</div>`:''}
      <div class="user-email">${u.email||'—'}</div>
      <div class="user-uid">UID: ${u.id}</div>
      <div class="user-meta">
        ${tipo!=='pendente'?`<span>Último acesso: ${ultimoAcesso}</span>`:''}
        ${u.createdAt?`<span>Criado: ${(u.createdAt.toDate?u.createdAt.toDate():new Date(u.createdAt)).toLocaleDateString('pt-BR')}</span>`:''}
      </div>
    </div>
    <div class="user-status">
      ${tipo==='admin'?'<span class="badge admin">👑 Admin</span>':''}
      ${tipo==='usuario'?'<span class="badge authorized">✅ Autorizado</span>':''}
      ${tipo==='pendente'?'<span class="badge pending">⏳ Pendente</span>':''}
      ${botoes}
    </div>
  </div>`;
}

// ══════════════════════════════════════════
// AÇÕES
// ══════════════════════════════════════════
function showModal(title,message,action){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-message').textContent=message;
  currentAction=action;
  document.getElementById('confirm-modal').classList.add('active');
}
function closeModal(){document.getElementById('confirm-modal').classList.remove('active');currentAction=null;}
document.getElementById('modal-confirm').onclick=()=>{if(currentAction)currentAction();closeModal();};

async function authorize(uid){
  showModal('Autorizar Usuário','Deseja autorizar este usuário a acessar o app?',async()=>{
    await db.collection('users').doc(uid).update({authorized:true});
    loadUsers();
  });
}
async function toggleAdmin(uid,isAdmin){
  showModal(
    isAdmin?'Remover Admin':'Tornar Admin',
    isAdmin?'Deseja remover a permissão de admin deste usuário?':'Deseja tornar este usuário administrador?',
    async()=>{
      await db.collection('users').doc(uid).update({role:isAdmin?'usuário':'admin'});
      loadUsers();
    }
  );
}
async function removeUser(uid){
  showModal('Remover Usuário','Esta ação é irreversível. Deseja continuar?',async()=>{
    await db.collection('users').doc(uid).delete();
    loadUsers();
  });
}

// ══════════════════════════════════════════
// AVISO
// ══════════════════════════════════════════
async function carregarDashboard(){/* integrado em loadUsers */}

async function carregarAvisoAtual(){
  try{
    const doc=await db.collection('config').doc('aviso').get();
    const container=document.getElementById('aviso-atual');
    if(doc.exists&&doc.data().ativo){
      const d=doc.data();
      document.getElementById('aviso-emoji').value=d.emoji||'';
      document.getElementById('aviso-texto').value=d.texto||'';
      container.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border-g);border-radius:6px;padding:.7rem .9rem;font-size:.82rem;color:var(--text2)">
        <span style="color:var(--text3);font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:.3rem">Aviso atual publicado:</span>
        ${d.emoji||''} ${d.texto||''}
      </div>`;
    }else{
      container.innerHTML='<div style="font-size:.8rem;color:var(--text3);font-style:italic">Nenhum aviso ativo no momento.</div>';
    }
  }catch(e){}
}

async function publicarAviso(){
  const texto=document.getElementById('aviso-texto').value.trim();
  const emoji=document.getElementById('aviso-emoji').value.trim()||'📢';
  const status=document.getElementById('aviso-status');
  if(!texto){status.textContent='⚠️ Escreva o aviso antes de publicar.';return;}
  try{
    await db.collection('config').doc('aviso').set({texto,emoji,ativo:true,id:Date.now().toString(),criadoEm:firebase.firestore.FieldValue.serverTimestamp()});
    status.textContent='✓ Aviso publicado!';status.style.color='var(--green2)';
    carregarAvisoAtual();
  }catch(e){status.textContent='❌ Erro: '+e.message;status.style.color='var(--red)';}
}

async function removerAviso(){
  const status=document.getElementById('aviso-status');
  try{
    await db.collection('config').doc('aviso').set({ativo:false});
    document.getElementById('aviso-texto').value='';
    document.getElementById('aviso-emoji').value='';
    status.textContent='✓ Aviso removido.';status.style.color='var(--text2)';
    carregarAvisoAtual();
  }catch(e){status.textContent='❌ Erro: '+e.message;}
}
</script>

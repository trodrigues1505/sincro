<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin — Sincronário</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* Mesmo design system do index */
:root{
  --bg:#071209;--bg2:#0a1a0c;--card:#0d1f0f;--card2:#112613;
  --green:#009739;--green2:#00b544;--green3:#006828;
  --gold:#A57C00;--gold2:#c9a030;
  --brown:#3C2F2F;
  --border:rgba(0,151,57,.20);--border2:rgba(0,151,57,.40);--border-g:rgba(165,124,0,.28);
  --text:#c0dcc4;--text2:#5a8860;--text3:#2e5034;
  --red:#8a2018;--radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;font-size:16px;line-height:1.65;min-height:100vh}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim-1{animation:fadeUp .28s both}
.anim-2{animation:fadeUp .28s .1s both}
.anim-3{animation:fadeUp .28s .2s both}

.container{max-width:820px;margin:0 auto;padding:1rem;animation:fadeUp .3s both}
h1{font-family:'Cinzel',serif;font-size:1.35rem;color:var(--green2);text-align:center;margin-bottom:.2rem;letter-spacing:.06em}

.user-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem 1rem;margin-bottom:.9rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:7px}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--green3)}

.btn-logout,.btn-back{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text3);padding:5px 11px;font-family:'Cinzel',serif;font-size:.6rem;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;transition:all .2s}
.btn-logout:hover{border-color:var(--green3);color:var(--text2)}
.btn-back{border-color:var(--border2);color:var(--green2)}
.btn-back:hover{background:var(--green3);color:var(--text);border-color:var(--green3)}

.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:.6rem}
.section h2{font-family:'Cinzel',serif;font-size:.6rem;color:var(--text3);margin-bottom:.9rem;text-transform:uppercase;letter-spacing:.13em;display:flex;align-items:center;gap:.5rem}
.section h2::after{content:'';flex:1;height:1px;background:var(--border)}

.user-item{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:.85rem;margin-bottom:.45rem;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;transition:border-color .2s}
.user-item:hover{border-color:var(--border2)}
.user-details{flex:1;min-width:180px}
.user-email{font-family:'Cinzel',serif;color:var(--green2);font-size:.83rem}
.user-uid{font-size:.63rem;color:var(--text3);word-break:break-all;margin-top:3px}
.user-status{display:flex;flex-wrap:wrap;gap:5px;align-items:center;justify-content:flex-end;min-width:240px}

.badge{padding:2px 8px;border-radius:3px;font-size:.6rem;text-transform:uppercase;font-weight:600;letter-spacing:.05em}
.badge.authorized{background:rgba(0,151,57,.12);color:var(--green2);border:1px solid rgba(0,151,57,.3)}
.badge.pending   {background:rgba(165,124,0,.1);color:var(--gold2);border:1px solid rgba(165,124,0,.27)}
.badge.admin     {background:rgba(165,124,0,.14);color:var(--gold2);border:1px solid rgba(165,124,0,.38)}

.btn-authorize,.btn-admin-toggle,.btn-remove{border:1px solid;border-radius:4px;padding:5px 10px;font-family:'Cinzel',serif;font-size:.58rem;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:all .2s;background:transparent}
.btn-authorize{color:var(--green2);border-color:rgba(0,151,57,.35)}
.btn-authorize:hover{background:var(--green);color:#fff;border-color:var(--green)}
.btn-admin-toggle{color:var(--gold2);border-color:rgba(165,124,0,.35)}
.btn-admin-toggle:hover{background:rgba(165,124,0,.18);border-color:var(--gold2)}
.btn-remove{color:var(--red);border-color:rgba(138,32,24,.32)}
.btn-remove:hover{background:var(--red);color:#fff;border-color:var(--red)}

.loading{color:var(--text3);text-align:center;padding:1rem;font-style:italic;font-size:.84rem}
.empty  {color:var(--text3);text-align:center;padding:1.8rem;font-style:italic;font-size:.84rem}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.55rem;margin-bottom:.9rem}
.stat-card{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:.8rem;text-align:center;transition:border-color .2s}
.stat-card:hover{border-color:var(--border2)}
.stat-number{font-family:'Cinzel',serif;font-size:1.65rem;color:var(--green2);margin-bottom:.2rem}
.stat-label{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}

.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.82);z-index:1000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:1.7rem;max-width:360px;width:90%}
.modal-content h3{color:var(--green2);margin-bottom:.65rem;font-family:'Cinzel',serif;font-size:.88rem;letter-spacing:.05em}
.modal-content p{color:var(--text2);margin-bottom:1.3rem;font-size:.87rem}
.modal-buttons{display:flex;gap:6px;justify-content:flex-end}
.btn-confirm,.btn-cancel{padding:6px 14px;border:1px solid;border-radius:4px;font-family:'Cinzel',serif;cursor:pointer;text-transform:uppercase;font-size:.6rem;letter-spacing:.05em;transition:all .2s;background:transparent}
.btn-confirm{color:var(--red);border-color:rgba(138,32,24,.42)}
.btn-confirm:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn-cancel{color:var(--text2);border-color:var(--border)}
.btn-cancel:hover{border-color:var(--green3);color:var(--text2)}

/* MEDIA QUERIES */
@media (max-width:768px){
  .container{padding:.9rem .75rem}
  h1{font-size:1.15rem}
  .user-bar{flex-direction:column;align-items:flex-start;padding:.65rem}
  .user-bar>div:last-child{width:100%;display:flex;gap:5px;flex-wrap:wrap}
  .btn-logout,.btn-back{flex:1;text-align:center;font-size:.57rem;padding:5px 8px}
  .user-item{flex-direction:column;gap:7px}
  .user-status{width:100%;flex-direction:column;min-width:auto;gap:4px}
  .btn-authorize,.btn-admin-toggle,.btn-remove{width:100%}
  .stat-number{font-size:1.35rem}
}
@media (max-width:480px){
  body{font-size:14px}
  .container{padding:.75rem .6rem}
  h1{font-size:.98rem}
  .user-bar{padding:.6rem}
  .user-avatar{width:26px;height:26px}
  .btn-logout,.btn-back{padding:4px 7px;font-size:.54rem}
  .section{padding:.8rem;margin-bottom:.45rem}
  .user-item{padding:.7rem;gap:6px}
  .user-email{font-size:.76rem}
  .user-uid{font-size:.57rem}
  .badge{padding:2px 6px;font-size:.55rem}
  .btn-authorize,.btn-admin-toggle,.btn-remove{padding:5px 8px;font-size:.54rem}
  .stats{grid-template-columns:1fr 1fr;gap:.45rem;margin-bottom:.75rem}
  .stat-card{padding:.65rem}
  .stat-number{font-size:1.2rem}
  .modal-content{padding:1.3rem}
  .modal-content h3{font-size:.8rem}
  .btn-confirm,.btn-cancel{padding:5px 11px;font-size:.57rem}
}
@media (max-width:360px){
  .container{padding:.6rem .45rem}
  h1{font-size:.88rem}
  .stats{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="container">
  <div class="user-bar anim-1">
    <div class="user-info">
      <img id="user-avatar" class="user-avatar" src="" alt="">
      <div>
        <div id="user-name" style="font-family:Cinzel;color:var(--text);font-size:.85rem"></div>
        <div style="font-size:.58rem;color:var(--gold2);text-transform:uppercase;letter-spacing:.08em">Admin</div>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn-back" onclick="window.location.href='index.html'">← Voltar</button>
      <button class="btn-logout" id="btn-logout">Sair</button>
    </div>
  </div>

  <h1 class="anim-1">👑 Painel Admin</h1>
  <p style="text-align:center;color:var(--text3);margin-bottom:1.2rem;font-size:.82rem;font-style:italic">Gerenciar usuários e permissões</p>

  <div class="stats anim-2" id="stats"></div>

  <div class="section anim-3">
    <h2>⏳ Pendentes de Autorização</h2>
    <div id="pending-users" class="loading">Carregando...</div>
  </div>

  <div class="section anim-3">
    <h2>✅ Usuários Autorizados</h2>
    <div id="authorized-users" class="loading">Carregando...</div>
  </div>
</div>

<div id="confirm-modal" class="modal">
  <div class="modal-content">
    <h3 id="modal-title">Confirmar ação</h3>
    <p id="modal-message"></p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" id="modal-confirm">Confirmar</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDOf77LceD2eKXlewRxxJT60hiBIlRJrJY",
  authDomain: "sincro13luas.firebaseapp.com",
  projectId: "sincro13luas",
  storageBucket: "sincro13luas.firebasestorage.app",
  messagingSenderId: "886057704979",
  appId: "1:886057704979:web:31b8348110ff8649c369e6"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

let currentUser = null;
let currentAction = null;

auth.onAuthStateChanged(async (user) => {
  if (user) {
    // Verificar se é admin
    const userDoc = await db.collection('users').doc(user.uid).get();
    if (!userDoc.exists || userDoc.data().role !== 'admin') {
      alert('❌ Acesso negado! Você não é admin.');
      window.location.href = 'index.html';
      return;
    }

    currentUser = user;
    document.getElementById('user-avatar').src = user.photoURL || '';
    document.getElementById('user-name').textContent = user.displayName;
    loadUsers();
  } else {
    window.location.href = 'index.html';
  }
});

document.getElementById('btn-logout').onclick = () => auth.signOut();

async function loadUsers() {
  try {
    const snapshot = await db.collection('users').get();
    const users = [];
    snapshot.forEach(doc => {
      users.push({ id: doc.id, ...doc.data() });
    });

    const pending = users.filter(u => !u.authorized);
    const authorized = users.filter(u => u.authorized);

    // Stats
    document.getElementById('stats').innerHTML = `
      <div class="stat-card">
        <div class="stat-number">${users.length}</div>
        <div class="stat-label">Total de Usuários</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${pending.length}</div>
        <div class="stat-label">Pendentes</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${authorized.length}</div>
        <div class="stat-label">Autorizados</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${users.filter(u => u.role === 'admin').length}</div>
        <div class="stat-label">Admins</div>
      </div>
    `;

    // Pending users
    if (pending.length === 0) {
      document.getElementById('pending-users').innerHTML = '<div class="empty">✅ Ninguém aguardando autorização</div>';
    } else {
      document.getElementById('pending-users').innerHTML = pending.map(u => `
        <div class="user-item">
          <div class="user-details">
            <div class="user-email">${u.email}</div>
            <div class="user-uid">UID: ${u.id}</div>
          </div>
          <div class="user-status">
            <span class="badge pending">Pendente</span>
            <button class="btn-authorize" onclick="authorize('${u.id}')">✅ Autorizar</button>
            <button class="btn-remove" onclick="removeUser('${u.id}')">🗑️ Remover</button>
          </div>
        </div>
      `).join('');
    }

    // Authorized users
    if (authorized.length === 0) {
      document.getElementById('authorized-users').innerHTML = '<div class="empty">Nenhum usuário autorizado</div>';
    } else {
      document.getElementById('authorized-users').innerHTML = authorized.map(u => `
        <div class="user-item">
          <div class="user-details">
            <div class="user-email">${u.email}</div>
            <div style="color:var(--text3);font-size:0.75rem;margin-top:4px">UID: ${u.id}</div>
          </div>
          <div class="user-status">
            <span class="badge authorized">✅ Autorizado</span>
            ${u.role === 'admin' ? '<span class="badge admin">👑 Admin</span>' : ''}
            <button class="btn-admin-toggle" onclick="toggleAdmin('${u.id}', ${u.role === 'admin'})">
              ${u.role === 'admin' ? '👤 Remover Admin' : '👑 Fazer Admin'}
            </button>
            <button class="btn-remove" onclick="removeUser('${u.id}')">🗑️ Remover</button>
          </div>
        </div>
      `).join('');
    }
  } catch (err) {
    console.error('Erro ao carregar usuários:', err);
    document.getElementById('pending-users').innerHTML = '<div class="empty">❌ Erro ao carregar</div>';
  }
}

function showModal(title, message, action) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-message').textContent = message;
  currentAction = action;
  document.getElementById('confirm-modal').classList.add('active');
}

function closeModal() {
  document.getElementById('confirm-modal').classList.remove('active');
  currentAction = null;
}

document.getElementById('modal-confirm').onclick = () => {
  if (currentAction) currentAction();
  closeModal();
};

async function authorize(uid) {
  showModal(
    'Autorizar Usuário',
    'Deseja autorizar este usuário a acessar o app?',
    async () => {
      await db.collection('users').doc(uid).update({ authorized: true });
      loadUsers();
    }
  );
}

async function toggleAdmin(uid, isAdmin) {
  const action = isAdmin ? 'remover' : 'tornar';
  showModal(
    `${isAdmin ? 'Remover' : 'Tornar'} Admin`,
    `Deseja ${action} este usuário como admin?`,
    async () => {
      await db.collection('users').doc(uid).update({ role: isAdmin ? 'usuário' : 'admin' });
      loadUsers();
    }
  );
}

async function removeUser(uid) {
  showModal(
    'Remover Usuário',
    'Esta ação é irreversível. Deseja continuar?',
    async () => {
      await db.collection('users').doc(uid).delete();
      loadUsers();
    }
  );
}
</script>
</body>
</html>
